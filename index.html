function enterBuilding(x, y) {
  // Gym check first
  const gymId = state.gymDoors && state.gymDoors[`${x},${y}`];
  if (gymId) { enterGym(gymId); return; }
  const isCenter = (state.world[y-1] && state.world[y-1][x] === 'R');
  const isMart   = (state.world[y-1] && state.world[y-1][x] === 'M');
  const isLab    = (state.world[y-1] && state.world[y-1][x] === 'L');
  if (isCenter) {
    setMsg(`NURSE JOY: "Welcome! Shall I restore your POKEMON to full health?"`);
    setActions([
      { label: 'YES', primary: true, onClick: () => { healParty(); enterOverworld(); } },
      { label: 'NO', onClick: enterOverworld },
    ]);
  } else if (isMart) {
    setMsg(`CLERK: "Welcome! Here's what we have today:"`);
    setActions([
      { label: '⚪ POKEBALL ($100)', primary: true, disabled: state.money < 100, onClick: () => {
        state.money -= 100; state.balls++; updateHeader(); saveLocal();
        setMsg(`CLERK: "Here you go!"`); setActions([{ label: 'SHOP MORE', onClick: () => enterBuilding(x, y) }, { label: 'LEAVE', back: true, onClick: enterOverworld }]);
      }},
      { label: '⚪ 5 BALLS ($450)', disabled: state.money < 450, onClick: () => {
        state.money -= 450; state.balls += 5; updateHeader(); saveLocal();
        setMsg(`CLERK: "Bulk discount!"`); setActions([{ label: 'SHOP MORE', onClick: () => enterBuilding(x, y) }, { label: 'LEAVE', back: true, onClick: enterOverworld }]);
      }},
      { label: '💊 POTION ($200)', disabled: state.money < 200, onClick: () => {
        state.money -= 200; state.items.potion = (state.items.potion||0)+1; updateHeader(); saveLocal();
        setMsg(`CLERK: "Heals 20 HP in battle!"`); setActions([{ label: 'SHOP MORE', onClick: () => enterBuilding(x, y) }, { label: 'LEAVE', back: true, onClick: enterOverworld }]);
      }},
      { label: '💊 SUPER POTION ($500)', disabled: state.money < 500, onClick: () => {
        state.money -= 500; state.items.superPotion = (state.items.superPotion||0)+1; updateHeader(); saveLocal();
        setMsg(`CLERK: "Heals 50 HP — handy!"`); setActions([{ label: 'SHOP MORE', onClick: () => enterBuilding(x, y) }, { label: 'LEAVE', back: true, onClick: enterOverworld }]);
      }},
      { label: 'LEAVE', back: true, onClick: enterOverworld },
    ]);
  } else if (isLab) {
    setMsg(`PROF. ROWAN: "My lab is always open to you, Noah! Keep filling the Sinnoh Pokedex!"`);
    setActions([{ label: 'LEAVE', primary: true, onClick: enterOverworld }]);
  } else {
    // Regular house — random friendly flavor so it doesn't feel locked
    const msgs = [
      `🏠 "This is just a quiet home. The family is resting. Try a building with a red roof (POKEMON CENTER) or blue roof (POKE MART)!"`,
      `🏠 "A little house. You hear a Pokemon snoring inside. Look for glowing signs or talk to people on the map!"`,
      `🏠 "This door has a welcome mat but nobody's home right now. Explore the tall grass or visit the PC/Mart instead!"`,
      `🏠 "You can hear kids doing homework inside. Head to buildings with a 🔬 sign for Prof. Rowan's Lab!"`,
    ];
    setMsg(msgs[Math.floor(Math.random() * msgs.length)]);
    setActions([{ label: 'OK', primary: true, onClick: enterOverworld }]);
  }
}

function checkEncounter() {
  const t = state.world[state.player.y][state.player.x];
  if (t === 'g') {
    state.stepsSinceEncounter++;
    const chance = 0.22 + Math.min(0.28, state.stepsSinceEncounter * 0.04);
    if (Math.random() < chance) {
      state.stepsSinceEncounter = 0;
      startWildBattle();
    }
  }
}

const WILD_COMMON = [396, 399, 401, 403, 406, 412, 418, 422, 427, 434, 41, 54, 74, 129, 453, 459, 420];
const WILD_RARE   = [443, 447, 425, 436, 433, 133, 408];

function pickWild() {
  const pool = Math.random() < 0.12 ? WILD_RARE : WILD_COMMON;
  const id = pool[Math.floor(Math.random() * pool.length)];
  return makeMon(id, randLv());
}

async function startWildBattle() {
  const wild = pickWild();
  state.battle = { wild };
  state.screen = 'battle';
  renderBattle(true);
  setMsg(`A wild ${wild.name.toUpperCase()} appeared!`);
  await sleep(1100);
  battleMainMenu();
}

async function startTrainerBattle(trainer, quizBonus) {
  // Build trainer team
  const team = trainer.team.map(t => makeMon(t.id, t.level));
  // If player got the quiz right, weaken the trainer's team slightly
  if (quizBonus) team.forEach(m => { m.atk = Math.floor(m.atk * 0.85); m.hp = Math.floor(m.hp * 0.9); m.maxHp = m.hp; });
  const first = team[0];
  state.battle = {
    wild: first,
    trainer: trainer,
    trainerTeam: team,
    trainerIndex: 0,
    quizBonus: !!quizBonus,
  };
  state.screen = 'battle';
  renderBattle(true);
  setMsg(`${trainer.name} sent out ${first.name.toUpperCase()}!`);
  await sleep(1200);
  battleMainMenu();
}

function enterGym(gymId) {

      <div class="trainer-name" style="color:${gym.color};">${gym.leader}</div>

      { label: '⬅ LEAVE', back: true, onClick: enterOverworld },
    ]);
  } else {
    setMsg(`${gym.leader} is telling you their story. Listen carefully — it matters!`);

async function beginGymBattle(gym, isRematch) {
  setMsg(`${gym.leader}: "${gym.challenge}"`);
  await sleep(1400);
  // Gym leaders are treated as trainers with tougher teams and a badge payout
  const leaderTrainer = {
    id: 'gym_' + gym.id,
    name: gym.leader + ' (Gym Leader)',
    team: gym.team,
    __gym: gym,
    __rematch: isRematch,
  };
  startTrainerBattle(leaderTrainer, false);
}

function awardBadge(gym, isRematch) {
  if (!isRematch) {
    state.badges[gym.id] = true;
    const r = gym.reward || {};
    if (r.money) state.money += r.money;
    if (r.balls) state.balls += r.balls;
    if (r.superPotion) state.items.superPotion = (state.items.superPotion||0) + r.superPotion;
    if (r.revive) state.items.revive = (state.items.revive||0) + r.revive;
    updateHeader();
    saveLocal();
  } else {
    state.money += 200;
    updateHeader();
    saveLocal();
  }
}

function enterCave() {
  state.returnPos = { x: state.player.x, y: state.player.y };
  // Build Oreburgh Mine maze (24x16)
  const W = 24, H = 16;
  const m = Array.from({length: H}, () => Array(W).fill('|'));
  // Carve some pathways — simple hand-designed maze
  const paths = [
    [[1,1],[2,1],[3,1],[4,1],[5,1],[6,1]],
    [[6,1],[6,2],[6,3],[6,4]],
    [[6,4],[7,4],[8,4],[9,4],[10,4]],
    [[10,4],[10,5],[10,6],[10,7]],
    [[10,7],[11,7],[12,7],[13,7]],
    [[1,1],[1,2],[1,3],[1,4],[1,5]],
    [[1,5],[2,5],[3,5]],
    [[3,5],[3,6],[3,7],[3,8]],
    [[3,8],[4,8],[5,8],[6,8],[7,8],[8,8]],
    [[8,8],[8,9],[8,10],[8,11],[8,12]],
    [[8,12],[9,12],[10,12],[11,12],[12,12]],
    [[12,12],[13,12],[14,12],[15,12]],
    [[15,12],[15,11],[15,10],[15,9],[15,8],[15,7]],
    [[15,7],[16,7],[17,7],[18,7],[19,7],[20,7]],
    [[20,7],[20,6],[20,5],[20,4],[20,3]],
    [[20,3],[21,3],[22,3]],
    [[13,7],[13,8],[13,9]],
    [[13,9],[14,9]],
  ];
  paths.forEach(path => path.forEach(([x,y]) => { if (m[y] && m[y][x] !== undefined) m[y][x] = '_'; }));
  // Entrance (bottom-left) and exit (top-right)
  m[1][1] = 'E'; // exit back to overworld
  m[3][22] = '_';  // treasure area — rare Pokemon
  state.interior = {
    map: m, w: W, h: H,
    type: 'cave',
    name: 'Oreburgh Mine',
    startX: 1, startY: 1,  // player spawns at exit mat
  };
  state.player.x = 1; state.player.y = 1;
  renderInterior();
  setMsg(`You entered OREBURGH MINE! Step on the ⬆ mat to leave. Wild rock Pokemon hide here!`);
  setActions([
    { label: '👥 PARTY', onClick: () => openParty(false) },
    { label: '💾 SAVE', onClick: saveLocal },
    { label: '🏆 BADGES', onClick: showBadgeCase },
  ]);
}

function renderInterior() {
  state.screen = 'interior';
  const { map, w, h } = state.interior;
  screen.innerHTML = `
    <div id="viewport">
      <div id="world"></div>
      <div class="minimap-label">📍 ${state.interior.name}</div>
      <div class="hint">Step on the exit mat ⬆ to leave</div>
    </div>
  `;
  const world = $('#world');
  world.style.width  = (w * TILE_SIZE) + 'px';
  world.style.height = (h * TILE_SIZE) + 'px';
  world.style.gridTemplateColumns = `repeat(${w}, ${TILE_SIZE}px)`;
  for (let y = 0; y < h; y++) {
    for (let x = 0; x < w; x++) {
      const c = map[y][x];
      const d = document.createElement('div');
      d.className = 'tile ' + (TILE_CLASS[c] || 'grass');
      world.appendChild(d);
    }
  }
  // Player
  const p = document.createElement('div');
  p.className = 'entity';
  p.id = 'player';
  p.innerHTML = playerSpriteSVG();
  world.appendChild(p);
  updatePlayerPos();
  updateCameraInterior();
}

function updateCameraInterior() {
  const world = $('#world'); if (!world || !state.interior) return;
  const vpW = screen.clientWidth;
  const vpH = screen.clientHeight;
  const { w, h } = state.interior;
  let camX = state.player.x * TILE_SIZE + TILE_SIZE/2 - vpW/2;
  let camY = state.player.y * TILE_SIZE + TILE_SIZE/2 - vpH/2;
  camX = Math.max(0, Math.min(w * TILE_SIZE - vpW, camX));
  camY = Math.max(0, Math.min(h * TILE_SIZE - vpH, camY));
  world.style.transform = `translate(${-camX}px, ${-camY}px)`;
}

function tryMoveInterior(dir) {
  const { map, w, h } = state.interior;
  let dx = 0, dy = 0;
  if (dir === 'up') dy = -1;
  else if (dir === 'down') dy = 1;
  else if (dir === 'left') dx = -1;
  else if (dir === 'right') dx = 1;
  state.player.dir = dir;
  const nx = state.player.x + dx, ny = state.player.y + dy;
  if (nx < 0 || ny < 0 || nx >= w || ny >= h) return;
  const t = map[ny][nx];
  if (BLOCKING.has(t)) return;
  state.player.x = nx; state.player.y = ny;
  updatePlayerPos();
  updateCameraInterior();
  // Exit tile
  if (t === 'E') { exitInterior(); return; }
  // Random cave encounter
  if (state.interior.type === 'cave' && Math.random() < 0.12) {
    startCaveBattle();
  }
}

function exitInterior() {
  state.interior = null;
  if (state.returnPos) {
    state.player.x = state.returnPos.x;
    state.player.y = state.returnPos.y;
    state.returnPos = null;
  }
  enterOverworld();
}

function startCaveBattle() {
  // Cave has rock/ground/psychic wilds
  const cavePool = [74, 41, 436, 408];
  const id = cavePool[Math.floor(Math.random() * cavePool.length)];
  const wild = makeMon(id, 8 + Math.floor(Math.random() * 6));
  state.battle = { wild, fromInterior: true };
  state.screen = 'battle';
  renderBattle(true);
  setMsg(`A wild ${wild.name.toUpperCase()} appeared in the cave!`);
  setTimeout(battleMainMenu, 1000);
}

function updateBattleUI() {
  const b = state.battle;
  const mon = state.party[state.activeMon];
  const eHp = $('#enemyHp');
  if (eHp) { eHp.style.width = (b.wild.hp / b.wild.maxHp * 100) + '%'; eHp.style.background = hpColor(b.wild.hp / b.wild.maxHp); }
  const pHp = $('#playerHp');
  if (pHp) { pHp.style.width = (mon.hp / mon.maxHp * 100) + '%'; pHp.style.background = hpColor(mon.hp / mon.maxHp); }
  const pText = $('#playerHpText'); if (pText) pText.textContent = `${mon.hp}/${mon.maxHp}`;
  const xp = $('#playerXp'); if (xp) xp.style.width = Math.min(100, (mon.xp / (mon.level * 20)) * 100) + '%';
}
function hpColor(p) {
  if (p > 0.5) return '#30c030';
  if (p > 0.2) return '#f8b030';
  return '#e04028';
}

function battleMainMenu() {

async function useItem(type) {
  const mon = state.party[state.activeMon];
  state.items = state.items || {};
  setActions([]);
  if (type === 'potion' || type === 'superPotion') {
    const heal = type === 'potion' ? 20 : 50;
    const before = mon.hp;
    mon.hp = Math.min(mon.maxHp, mon.hp + heal);
    state.items[type]--;
    updateBattleUI();
    setMsg(`${mon.name.toUpperCase()} recovered ${mon.hp - before} HP!`);
    saveLocal();
    await sleep(1100);
    await enemyTurn();
  } else if (type === 'revive') {
    // Revive an unused fainted Pokemon
    const fainted = state.party.findIndex(m => m.hp <= 0);
    if (fainted === -1) { setMsg('No Pokemon need reviving!'); await sleep(1000); battleMainMenu(); return; }
    state.party[fainted].hp = Math.floor(state.party[fainted].maxHp / 2);
    state.items.revive--;
    setMsg(`${state.party[fainted].name.toUpperCase()} was revived!`);
    saveLocal();
    await sleep(1100);
    await enemyTurn();
  }
}
function menuFight() {
  const mon = state.party[state.activeMon];
  const btns = mon.moves.map(m => ({
    label: m.toUpperCase(),
    onClick: () => doPlayerMove(m),
  }));
  btns.push({ label: '⬅ BACK', back: true, onClick: battleMainMenu });
  setActions(btns);
  setMsgInstant('Choose a move:');
}

function typeMultiplier(moveType, targetTypes) {
  let mult = 1;
  targetTypes.forEach(t => {
    const tc = TYPE_CHART[moveType];
    if (tc && tc[t] !== undefined) mult *= tc[t];
  });
  return mult;
}

function calcDamage(attacker, defender, move) {
  const m = MOVES[move];
  if (!m || m.power <= 1) return { dmg: 0, eff: 1 };
  const eff = typeMultiplier(m.type, defender.types);
  const stab = attacker.types.includes(m.type) ? 1.5 : 1;
  const base = ((2 * attacker.level / 5 + 2) * m.power * (attacker.atk / defender.def)) / 50 + 2;
  const variance = 0.85 + Math.random() * 0.15;
  const dmg = Math.max(eff > 0 ? 1 : 0, Math.floor(base * eff * stab * variance));
  return { dmg, eff };
}

function getSpritePos(selector) {
  const el = document.querySelector(selector);
  if (!el) return { x: 0, y: 0, w: 0, h: 0 };
  const rect = el.getBoundingClientRect();
  const parent = $('#battleRoot').getBoundingClientRect();
  return {
    x: rect.left - parent.left,
    y: rect.top - parent.top,
    w: rect.width, h: rect.height,
    cx: rect.left - parent.left + rect.width/2,
    cy: rect.top - parent.top + rect.height/2,
  };
}

async function playMoveAnimation(moveName, attackerIsPlayer) {
  const mv = MOVES[moveName];
  if (!mv) return;
  const root = $('#battleRoot');
  if (!root) return;

  const attackerSel = attackerIsPlayer ? '#playerSprite' : '#enemySprite';
  const targetSel   = attackerIsPlayer ? '#enemySprite' : '#playerSprite';
  const attackerEl  = document.querySelector(attackerSel);
  const targetEl    = document.querySelector(targetSel);
  const aPos = getSpritePos(attackerSel);
  const tPos = getSpritePos(targetSel);

  // Small lunge from attacker
  attackerEl.classList.add(attackerIsPlayer ? 'attack-forward' : 'attack-back');
  setTimeout(() => attackerEl.classList.remove('attack-forward','attack-back'), 400);

  const fx = mv.fx;
  switch (fx) {
    case 'fire':     await animateProjectiles(aPos, tPos, ['🔥','🔥','🔥','✨'], 6, '#ff6020'); break;
    case 'water':    await animateProjectiles(aPos, tPos, ['💧','💦','💧'], 8, '#4090f0'); break;
    case 'electric': await animateElectric(tPos); break;
    case 'grass':    await animateProjectiles(aPos, tPos, ['🍃','🌿','🍃'], 7, '#60c840'); break;
    case 'impact':   await animateImpact(tPos, '💥'); break;
    case 'slash':    await animateSlash(tPos); break;
    case 'dash':     await animateDash(attackerIsPlayer, aPos, tPos); break;
    case 'bite':     await animateImpact(tPos, '🦷'); break;
    case 'rock':     await animateProjectiles(aPos, tPos, ['🪨','🪨','⬛'], 5, '#888'); break;
    case 'ground':   await animateGround(tPos); break;
    case 'ghost':    await animateGhost(tPos); break;
    case 'psychic':  await animatePsychic(tPos); break;
    case 'dragon':   await animateDragon(aPos, tPos); break;
    case 'fighting': await animateImpact(tPos, '👊'); break;
    case 'ice':      await animateProjectiles(aPos, tPos, ['❄️','🌨','❄️'], 7, '#a0d8f0'); break;
    case 'wind':     await animateProjectiles(aPos, tPos, ['💨','💨','🌬'], 5, '#c8c8e0'); break;
    case 'stat':     await animateStat(attackerEl); break;
    case 'splash':   await animateSplash(aPos); break;
    default:         await animateImpact(tPos, '💥');
  }
}

async function doPlayerMove(moveName) {
  const b = state.battle;
  const mon = state.party[state.activeMon];
  setActions([]);

  // 🧠 MATH BOOST — optional but rewarding
  const mathCorrect = await askMathBoost('attack', b.wild.id);
  const damageMultiplier = mathCorrect ? 1.5 : 1.0;   // big boost if right, normal if wrong

  setMsg(`${mon.name.toUpperCase()} used ${moveName.toUpperCase()}!${mathCorrect ? ' (Power boost!)' : ''}`);
  await sleep(600);

  await playMoveAnimation(moveName, true);

  const es = $('#enemySprite'); es.classList.add('hit');
  await sleep(500);
  es.classList.remove('hit');

  const { dmg: baseDmg, eff } = calcDamage(mon, b.wild, moveName);
  const dmg = Math.max(baseDmg > 0 ? 1 : 0, Math.floor(baseDmg * damageMultiplier));
  b.wild.hp = Math.max(0, b.wild.hp - dmg);
  updateBattleUI();

  if (moveName === 'Splash') setMsgInstant("But nothing happened...");
  else if (MOVES[moveName].power === 0) setMsgInstant(`${mon.name.toUpperCase()}'s ${moveName.toUpperCase()} had an effect!`);
  else if (eff > 1) setMsgInstant(`A critical hit! It's SUPER EFFECTIVE! (-${dmg} HP)`);
  else if (eff < 1 && eff > 0) setMsgInstant(`It's not very effective... (-${dmg} HP)`);
  else if (eff === 0) setMsgInstant(`It had no effect on ${b.wild.name.toUpperCase()}...`);
  else setMsgInstant(`${b.wild.name.toUpperCase()} took ${dmg} damage.${mathCorrect ? ' 💪 Great math!' : ''}`);
  await sleep(900);

  if (b.wild.hp <= 0) { await faintEnemy(); return; }
  await enemyTurn();
}

async function enemyTurn() {
  const b = state.battle;
  const mon = state.party[state.activeMon];
  const move = b.wild.moves[Math.floor(Math.random() * b.wild.moves.length)];
  setMsg(`Wild ${b.wild.name.toUpperCase()} used ${move.toUpperCase()}!`);
  await sleep(700);

  await playMoveAnimation(move, false);

  const ps = $('#playerSprite'); ps.classList.add('hit');
  await sleep(500);
  ps.classList.remove('hit');

  const { dmg, eff } = calcDamage(b.wild, mon, move);
  mon.hp = Math.max(0, mon.hp - dmg);
  updateBattleUI();

  if (eff > 1) setMsgInstant(`It's SUPER EFFECTIVE! (-${dmg} HP)`);
  else if (eff < 1 && eff > 0 && dmg > 0) setMsgInstant(`It's not very effective... (-${dmg} HP)`);
  else if (dmg > 0) setMsgInstant(`${mon.name.toUpperCase()} took ${dmg} damage.`);
  else setMsgInstant(`But it failed!`);
  await sleep(900);

  if (mon.hp <= 0) { await faintPlayer(); return; }
  battleMainMenu();
}

async function faintEnemy() {
  const b = state.battle;
  const mon = state.party[state.activeMon];
  $('#enemySprite').classList.add('faint');
  const isTrainer = !!b.trainer;
  setMsgInstant(isTrainer
    ? `${b.trainer.name}'s ${b.wild.name.toUpperCase()} is tired!`
    : `Wild ${b.wild.name.toUpperCase()} is tired!`);
  const xpGain = (isTrainer ? 15 : 10) + b.wild.level * 5;
  mon.xp += xpGain;
  const cash = (isTrainer ? 40 : 20) + b.wild.level * 8;
  state.money += cash;
  updateHeader();
  await sleep(1100);
  setMsg(`${mon.name.toUpperCase()} gained ${xpGain} EXP! Got $${cash}.`);
  let leveledUp = false;
  while (mon.xp >= mon.level * 20) {
    mon.xp -= mon.level * 20;
    mon.level++;
    mon.maxHp += 4; mon.hp += 4;
    mon.atk += 2; mon.def += 2;
    leveledUp = true;
  }
  updateBattleUI();
  await sleep(900);
  if (leveledUp) {
    setMsg(`🌟 ${mon.name.toUpperCase()} grew to Lv${mon.level}!`);
    await sleep(1300);
    await tryEvolutions(mon);
  }

  // Trainer: send out next Pokemon, or end battle
  if (isTrainer) {
    b.trainerIndex++;
    if (b.trainerIndex < b.trainerTeam.length) {
      const next = b.trainerTeam[b.trainerIndex];
      b.wild = next;
      setMsg(`${b.trainer.name} sent out ${next.name.toUpperCase()}!`);
      await sleep(1100);
      renderBattle();
      await sleep(400);
      battleMainMenu();
      return;
    } else {
      // WIN! Reward
      state.defeatedTrainers[b.trainer.id] = true;
      if (b.trainer.__gym) {
        // This was a gym leader!
        const gym = b.trainer.__gym;
        awardBadge(gym, b.trainer.__rematch);
        setMsg(`🏆 You defeated ${gym.leader}!`);
        await sleep(1500);
        if (!b.trainer.__rematch) {
          setMsg(`✨ You earned the ${gym.emoji} ${gym.badge}! ${gym.leader}'s story will inspire you forever.`);
          await sleep(2200);
          const r = gym.reward || {};
          setMsg(`Rewards: +$${r.money || 0}${r.balls ? `, +${r.balls} BALLS` : ''}${r.superPotion ? `, +${r.superPotion} SUPER POTION` : ''}${r.revive ? `, +${r.revive} REVIVE` : ''}!`);
          await sleep(2000);
        } else {
          setMsg(`Thanks for the rematch! +$200.`);
          await sleep(1500);
        }
      } else {
        state.balls += 2;
        state.money += 150;
        updateHeader();
        saveLocal();
        setMsg(`🏆 You beat ${b.trainer.name}! +2 POKEBALLS, +$150!`);
        await sleep(1600);
        setMsg(`${b.trainer.name}: "Great battle, Noah! Remember what I taught you — history is full of heroes."`);
        await sleep(1800);
      }
      endBattle();
      return;
    }
  }
  endBattle();
}

async function tryEvolutions(mon) {
  // Loop so a Pokemon that leveled several times can chain-evolve
  while (true) {
    const evo = EVOLUTIONS[mon.id];
    if (!evo || mon.level < evo.level) return;
    const cancel = await runEvolutionScene(mon, evo.to);
    if (cancel) { setMsg(`Huh? ${mon.name.toUpperCase()} stopped evolving!`); await sleep(1400); return; }
    applyEvolution(mon, evo.to);
    saveLocal();
    // small pause then check for another stage
    await sleep(400);
  }
}

function applyEvolution(mon, newId) {
  const base = POKEDEX[newId];
  if (!base) return;
  // Keep the current HP proportion
  const hpRatio = mon.hp / mon.maxHp;
  mon.id = newId;
  mon.name = base.name;
  mon.types = base.types.slice();
  mon.maxHp = Math.floor(base.hp * (1 + mon.level * 0.1));
  mon.hp = Math.max(1, Math.floor(mon.maxHp * hpRatio));
  mon.atk = Math.floor(base.atk * (1 + mon.level * 0.08));
  mon.def = Math.floor(base.def * (1 + mon.level * 0.08));
  mon.catchRate = base.catchRate;
  // Learn new moves from evolved form's list (keep any overlap)
  const existing = new Set(mon.moves);
  base.moves.forEach(m => { if (!existing.has(m)) mon.moves.push(m); });
  // Cap moves to 4 (Pokemon convention)
  if (mon.moves.length > 4) mon.moves = mon.moves.slice(0, 4);
}

function runEvolutionScene(mon, newId) {
  return new Promise((resolve) => {
    const prevScreen = state.screen;
    state.screen = 'evolution';
    const newBase = POKEDEX[newId];
    const oldName = mon.name.toUpperCase();
    const newName = newBase.name.toUpperCase();

    screen.innerHTML = `
      <div class="evo-screen fade-in">
        <div class="evo-stars"></div>
        <div class="evo-title">✨ WHAT? ✨</div>
        <div class="evo-wrap">
          <img class="evo-sprite" id="evoOld" src="${SPRITE_FRONT(mon.id)}" alt="${mon.name}">
          <img class="evo-sprite hidden" id="evoNew" src="${SPRITE_FRONT(newId)}" alt="${newBase.name}">
        </div>
        <div class="evo-caption" id="evoCaption">${oldName} is evolving!</div>
      </div>
    `;
    setMsg(`${oldName} is evolving! Press CANCEL to stop it, or WATCH to continue.`);
    let cancelled = false;
    let finished = false;

    setActions([
      { label: '▶ CONTINUE', primary: true, onClick: () => { /* let it run */ } },
      { label: '❌ CANCEL', onClick: () => { cancelled = true; setActions([]); } },
    ]);

    const oldEl = document.getElementById('evoOld');
    const newEl = document.getElementById('evoNew');

    // Phase 1: pulsing white light for ~3 seconds, player can cancel during this
    oldEl.classList.add('white-out');
    oldEl.classList.add('morph');

    const checkpoints = [500, 1100, 1700, 2300, 2900];
    checkpoints.forEach(ms => {
      setTimeout(() => {
        if (finished) return;
        if (cancelled) {
          oldEl.classList.remove('white-out','morph');
          newEl.classList.add('hidden');
          finished = true;
          setMsg(`Huh? ${oldName} stopped evolving!`);
          setActions([]);
          setTimeout(() => resolve(true), 300);
        }
      }, ms);
    });

    // Phase 2: full flash, swap to new sprite
    setTimeout(() => {
      if (cancelled || finished) return;
      const fl = document.createElement('div');
      fl.className = 'evo-flash-full';
      screen.querySelector('.evo-screen').appendChild(fl);
      setTimeout(() => fl.remove(), 600);

      // sparkles burst
      const wrap = screen.querySelector('.evo-wrap');
      for (let i = 0; i < 14; i++) {
        const s = document.createElement('div');
        s.className = 'sparkle';
        s.textContent = ['✨','⭐','🌟'][i % 3];
        const angle = (Math.PI * 2) * (i / 14);
        s.style.setProperty('--dx', Math.cos(angle) * 120 + 'px');
        s.style.setProperty('--dy', Math.sin(angle) * 120 + 'px');
        s.style.left = '100px';
        s.style.top = '100px';
        wrap.appendChild(s);
        setTimeout(() => s.remove(), 1300);
      }

      oldEl.classList.add('hidden');
      oldEl.classList.remove('white-out','morph');
      newEl.classList.remove('hidden');
      document.getElementById('evoCaption').innerHTML =
        `Congratulations!<br>${oldName} evolved into <span style="color:#ffd030">${newName}</span>!`;
      setMsg(`Congratulations! ${oldName} evolved into ${newName}!`);

      setActions([{ label: '✓ AWESOME', primary: true, onClick: () => {
        finished = true;
        state.screen = prevScreen;
        resolve(false);
      }}]);

      // Auto-advance after a while if user doesn't click
      setTimeout(() => {
        if (!finished) {
          finished = true;
          state.screen = prevScreen;
          resolve(false);
        }
      }, 4500);
    }, 3300);
  });
}

async function faintPlayer() {
  const mon = state.party[state.activeMon];
  $('#playerSprite').classList.add('faint');
  setMsg(`${mon.name.toUpperCase()} fainted!`);
  await sleep(1300);
  const alive = state.party.findIndex(m => m.hp > 0);
  if (alive === -1) {
    setMsg(`Noah is out of usable POKEMON! You blacked out and returned to the Pokemon Center...`);
    await sleep(1900);
    state.party.forEach(m => m.hp = Math.max(1, Math.floor(m.maxHp / 2)));
    state.money = Math.max(0, state.money - 100);
    updateHeader();
    endBattle();
  } else {
    setMsg('Choose another POKEMON!');
    openParty(true);
  }
}

async function tryCatch() {
  if (state.balls <= 0) { setMsg('You have no POKEBALLS!'); return; }
  const b = state.battle;
  state.balls--;
  updateHeader();
  setActions([]);

  // 🧠 MATH BOOST — solve to improve catch rate
  const mathCorrect = await askMathBoost('catch', b.wild.id);
  setMsg(`Noah threw a POKEBALL!`);

  const pb = document.createElement('div');
  pb.className = 'pokeball-anim throw';
  $('#battleRoot').appendChild(pb);
  await sleep(900);
  pb.classList.remove('throw');
  pb.style.left = '520px'; pb.style.top = '160px';

  const es = $('#enemySprite'); if (es) es.style.visibility = 'hidden';

  const hpRatio = b.wild.hp / b.wild.maxHp;
  const mathMultiplier = mathCorrect ? 1.6 : 1.05;   // big boost if right, tiny pity if wrong
  const chance = Math.min(0.97, b.wild.catchRate * (1.8 - hpRatio) * mathMultiplier);
  const shakes = Math.min(3, Math.floor(chance * 4) + Math.floor(Math.random() * 2));

  pb.classList.add('wiggle');
  for (let i = 0; i < shakes; i++) { await sleep(600); setMsgInstant(`shake... (${i+1})`); }
  pb.classList.remove('wiggle');
  await sleep(400);

  if (Math.random() < chance) {
    setMsg(`Gotcha! ${b.wild.name.toUpperCase()} was caught!${b.wild.shiny ? ' ⭐ It was SHINY!' : ''}`);
    state.caught++;
    const captured = makeMon(b.wild.id, b.wild.level, { location: state.location, date: new Date().toLocaleDateString() });
    captured.shiny = b.wild.shiny || captured.shiny;   // preserve wild's shiny flag
    captured.gender = b.wild.gender;
    captured.hp = Math.max(1, b.wild.hp);
    if (state.party.length < 6) state.party.push(captured);
    else setMsg(`Gotcha! ${b.wild.name.toUpperCase()} caught! (Party full — sent to PC)`);
    updateHeader();
    saveLocal();
    await sleep(1700);
    pb.remove();
    endBattle();
  } else {
    if (es) es.style.visibility = 'visible';
    pb.remove();
    setMsg(`Oh no! The POKEMON broke free!`);
    await sleep(1100);
    await enemyTurn();
  }
}

async function tryRun() {
  setActions([]);
  setMsg(`Got away safely!`);
  await sleep(900);
  endBattle();
}

function endBattle() {
  const wasInterior = state.battle?.fromInterior || state.interior;
  state.battle = null;
  saveLocal();
  if (wasInterior && state.interior) { renderInterior(); }
  else { enterOverworld(); }
}

// =========================================================================
// PARTY
// =========================================================================
function openParty(forceSwitch) {
  const prev = state.screen;
  state.screen = 'party';
  const genderIcon = g => g === 'male' ? '<span style="color:#4090f0">♂</span>' : g === 'female' ? '<span style="color:#e06090">♀</span>' : '';
  const body = state.party.map((m, i) => `
    <div class="party-mon ${i === state.activeMon ? 'active' : ''} ${m.hp <= 0 ? 'fainted' : ''}" data-i="${i}">
      <img src="${SPRITE_FRONT(m.id)}" alt="${m.name}" style="${m.shiny ? 'filter: hue-rotate(45deg) brightness(1.3) drop-shadow(0 0 4px gold);' : ''}">
      <div class="info">
        <div class="n">${m.shiny ? '⭐ ' : ''}${m.name.toUpperCase()} ${genderIcon(m.gender)} Lv${m.level}</div>
        <div>${m.types.map(t => `<span class="type-pill type-${t}">${t.toUpperCase()}</span>`).join('')}</div>
        <div style="margin-top:3px">HP ${m.hp}/${m.maxHp}</div>
        <div>Nature: ${m.nature || 'Hardy'}</div>
        <div style="font-size:7px;opacity:0.7;">Caught: ${m.caughtLocation || 'Unknown'}</div>
      </div>
      <button class="btn" style="font-size:8px;padding:6px;" data-detail="${i}">📕 INFO</button>
    </div>
  `).join('');
  screen.innerHTML = `
    <div class="party-screen fade-in">
      <h2>NOAH'S TEAM (${state.party.length}/6) — ${state.caught} CAUGHT</h2>
      <div class="party-list">${body}</div>
    </div>
  `;
  setMsg(forceSwitch ? 'Send out which POKEMON?' : "Tap a POKEMON to send it out, or tap INFO for Pokedex details.");
  setActions([{ label: '⬅ BACK', back: true, onClick: () => {
    if (prev === 'battle') { renderBattle(); battleMainMenu(); }
    else enterOverworld();
  } }]);
  document.querySelectorAll('.party-mon').forEach(el => {
    el.onclick = async (e) => {
      if (e.target.dataset.detail !== undefined) {
        openPokemonDetail(parseInt(e.target.dataset.detail), prev, forceSwitch);
        return;
      }
      const i = parseInt(el.dataset.i);
      if (state.party[i].hp <= 0) { setMsg(`${state.party[i].name.toUpperCase()} has fainted!`); return; }
      state.activeMon = i;
      setMsg(`Go! ${state.party[i].name.toUpperCase()}!`);
      await sleep(700);
      if (prev === 'battle') {
        renderBattle();
        if (forceSwitch) { await sleep(400); await enemyTurn(); }
        else battleMainMenu();
      } else { enterOverworld(); }
    };
  });
}

function openPokemonDetail(idx, prevScreen, forceSwitch) {
  const m = state.party[idx];
  const dex = POKEDEX_ENTRIES[m.id] || { category: 'Unknown', height: '?', weight: '?', entry: 'Not much is known yet about this Pokemon. Keep exploring!' };
  const gLabel = m.gender === 'male' ? '♂ Male' : m.gender === 'female' ? '♀ Female' : 'Genderless';
  const totalStats = m.atk + m.def + m.maxHp;
  screen.innerHTML = `
    <div class="party-screen fade-in" style="padding:16px;">
      <h2>📕 POKEDEX ENTRY #${String(m.id).padStart(3,'0')}</h2>
      <div style="background:var(--fr-cream);border:3px solid var(--fr-brown);border-radius:8px;padding:12px;color:var(--fr-dark);">
        <div style="display:flex;gap:14px;align-items:center;">
          <img src="${SPRITE_FRONT(m.id)}" style="width:96px;height:96px;${m.shiny ? 'filter:hue-rotate(45deg) brightness(1.3) drop-shadow(0 0 6px gold);' : ''}">
          <div style="flex:1;">
            <div style="font-size:12px;">${m.shiny ? '⭐ ' : ''}${m.name.toUpperCase()}</div>
            <div style="font-size:8px;opacity:0.7;margin-top:2px;">${dex.category} Pokemon</div>
            <div style="font-size:8px;margin-top:4px;">
              ${m.types.map(t => `<span class="type-pill type-${t}">${t.toUpperCase()}</span>`).join('')}
            </div>
            <div style="font-size:8px;margin-top:6px;">Height: ${dex.height} • Weight: ${dex.weight}</div>
            <div style="font-size:8px;margin-top:2px;">${gLabel} • Lv ${m.level}</div>
          </div>
        </div>
        <div style="font-size:8px;line-height:1.7;margin-top:12px;padding:10px;background:#fff;border-radius:6px;">
          📖 <b>POKEDEX:</b> ${dex.entry}
        </div>
        <div style="font-size:8px;margin-top:10px;display:grid;grid-template-columns:1fr 1fr;gap:6px;">
          <div>❤️ HP: <b>${m.hp} / ${m.maxHp}</b></div>
          <div>⚔️ Attack: <b>${m.atk}</b></div>
          <div>🛡️ Defense: <b>${m.def}</b></div>
          <div>🎯 XP: <b>${m.xp}/${m.level*20}</b></div>
          <div>🧠 Nature: <b>${m.nature || 'Hardy'}</b></div>
          <div style="font-size:7px;opacity:0.7;">${m.natureDesc || ''}</div>
        </div>
        <div style="font-size:8px;margin-top:10px;padding:8px;background:#f0f8ff;border-radius:6px;">
          📍 Caught at: <b>${m.caughtLocation}</b><br>
          📅 Date: <b>${m.caughtDate}</b><br>
          🎒 Caught at Lv ${m.caughtLevel}
        </div>
        <div style="font-size:8px;margin-top:10px;">
          <b>Moves:</b>
          ${m.moves.map(mv => `<div style="margin-top:4px;padding:5px;background:#fff;border-radius:4px;">🗡 ${mv.toUpperCase()} <span class="type-pill type-${(MOVES[mv]?.type || 'normal')}">${(MOVES[mv]?.type || 'normal').toUpperCase()}</span> <span style="opacity:0.7">Power ${MOVES[mv]?.power || '—'}</span></div>`).join('')}
        </div>
      </div>
    </div>
  `;
  setMsg(`Look at everything about your ${m.name.toUpperCase()}!`);
  setActions([{ label: '⬅ BACK TO PARTY', back: true, onClick: () => openParty(forceSwitch) }]);
}

function healParty() {
  state.party.forEach(m => m.hp = m.maxHp);
  state.balls = Math.min(40, state.balls + 3);
  updateHeader();
  setMsg(`NURSE JOY: "Your POKEMON are fully restored! We also gave you 3 POKEBALLS. 💊"`);
}

// =========================================================================
// BOOT
// =========================================================================
function boot() {
  setupMobileControls();
  // Header SAVE button always works
  const hs = document.getElementById('headerSave');
  if (hs) hs.addEventListener('click', () => {
    if (state.party.length === 0) { flashCloudIndicator('Nothing to save yet', '#888'); return; }
    saveLocal();
  });
  // Wait a tick so Firebase init module can run
  renderTitle();
  // Auto-sync: if user was previously signed in, Firebase will restore session
  if (window.firebaseEnabled) {
    const hook = () => {
      if (window.fb) {
        window.fb.onAuth(async (u) => {
          if (u) {
            state.user = { uid: u.uid, email: u.email };
            updateAccountBadge();
            // Pull cloud save automatically (merge: cloud wins if newer)
            const localRaw = localStorage.getItem(SAVE_KEY);
            let localAt = 0; try { localAt = JSON.parse(localRaw || '{}').savedAt || 0; } catch {}
            try {
              const cloud = await window.fb.loadDoc(state.user.uid);
              if (cloud && (cloud.savedAt || 0) >= localAt) {
                applySavePayload(cloud);
                try { localStorage.setItem(SAVE_KEY, JSON.stringify(cloud)); } catch {}
                flashCloudIndicator('☁️ Cloud save loaded', '#30a040');
              } else if (hasLocalSave()) {
                await doCloudSave();
              }
            } catch (e) { console.warn('auto-sync failed', e); }
            if (state.screen === 'title') renderTitle();
          } else {
            state.user = null; updateAccountBadge();
            if (state.screen === 'title') renderTitle();
          }
        });
      }
    };
    if (window.fb) hook();
    else window.addEventListener('firebase-ready', hook);
  }
  updateAccountBadge();
}
boot();

// Autosave periodically too (every 30 sec while playing)
setInterval(() => {
  if (state.screen === 'overworld' || state.screen === 'battle') saveLocal();
}, 30000);

window.addEventListener('resize', () => {
  if (state.screen === 'overworld') { updatePlayerPos(); updateCamera(); }
});
</script>
