<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pokemon Catch Game — Sinnoh Adventure</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<!-- =====  FIREBASE (cloud save + accounts)  =====
     Replace the placeholder values below with your own Firebase project's config.
     Step-by-step setup is in FIREBASE-SETUP.md (also saved in this folder).
     Until you replace these, the game still works and saves locally in the browser.
-->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import {
    getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword,
    signOut, onAuthStateChanged
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import {
    getFirestore, doc, setDoc, getDoc
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  // === REPLACE THIS BLOCK with the config from your Firebase console ===
  const firebaseConfig = {
    apiKey: "REPLACE_ME",
    authDomain: "REPLACE_ME.firebaseapp.com",
    projectId: "REPLACE_ME",
    storageBucket: "REPLACE_ME.appspot.com",
    messagingSenderId: "REPLACE_ME",
    appId: "REPLACE_ME"
  };
  // =====================================================================

  const firebaseEnabled = !firebaseConfig.apiKey.includes('REPLACE_ME');
  window.firebaseEnabled = firebaseEnabled;

  if (firebaseEnabled) {
    try {
      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);
      const db = getFirestore(app);
      window.fb = {
        auth, db,
        createUser: (e,p) => createUserWithEmailAndPassword(auth, e, p),
        signIn:     (e,p) => signInWithEmailAndPassword(auth, e, p),
        signOut:    () => signOut(auth),
        onAuth:     (cb) => onAuthStateChanged(auth, cb),
        saveDoc:    (uid, data) => setDoc(doc(db, "saves", uid), data),
        loadDoc:    async (uid) => (await getDoc(doc(db, "saves", uid))).data(),
      };
      window.dispatchEvent(new Event('firebase-ready'));
    } catch (e) {
      console.warn('Firebase init failed:', e);
      window.firebaseEnabled = false;
    }
  }
</script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --fr-red: #e03028;
    --fr-red-dk: #a82020;
    --fr-cream: #f8e0b0;
    --fr-brown: #684028;
    --fr-dark-brown: #402818;
    --fr-tan: #e8c078;
    --fr-blue: #2868a8;
    --fr-dark: #202830;
    --fr-light: #f8f8f8;
  }
  body {
    font-family: 'Press Start 2P', 'Courier New', monospace;
    background: #0c0c14;
    background-image:
      radial-gradient(circle at 20% 20%, rgba(224,48,40,0.12) 0, transparent 50%),
      radial-gradient(circle at 80% 80%, rgba(40,104,168,0.12) 0, transparent 50%);
    color: var(--fr-dark);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
    user-select: none;
  }
  img { image-rendering: pixelated; image-rendering: crisp-edges; }

  #game {
    width: 768px;
    max-width: 100%;
    background: var(--fr-red);
    border: 4px solid #401010;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 16px 50px rgba(0,0,0,0.7), inset 0 0 0 2px rgba(255,255,255,0.1);
  }
  #header {
    background: linear-gradient(180deg, var(--fr-red) 0%, var(--fr-red-dk) 100%);
    padding: 10px 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    color: #fff;
    font-size: 9px;
    border-bottom: 3px solid #401010;
    text-shadow: 1px 1px 0 #000;
  }
  #title { font-size: 10px; letter-spacing: 1px; }
  #stats { font-size: 8px; letter-spacing: 1px; }

  #screen {
    position: relative;
    width: 100%;
    height: 480px;
    background: #000;
    overflow: hidden;
    border-top: 2px solid #401010;
    border-bottom: 2px solid #401010;
  }

  /* Title Screen */
  .title-screen {
    position: absolute; inset: 0;
    background:
      linear-gradient(180deg, #f87858 0%, #e03028 50%, #a81818 100%);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center; color: #fff; padding: 20px;
  }
  .title-screen h1 {
    font-size: 26px;
    text-shadow: 3px 3px 0 #401010, 6px 6px 0 rgba(0,0,0,0.4);
    margin-bottom: 6px;
    letter-spacing: 2px; line-height: 1.3;
  }
  .title-screen h2 {
    font-size: 12px; color: #ffd030;
    text-shadow: 2px 2px 0 #401010; margin-bottom: 18px;
  }
  .title-screen .big-sprite {
    width: 150px; height: 150px;
    background: rgba(255,255,255,0.22);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    margin: 10px 0;
    box-shadow: 0 0 40px rgba(255,255,255,0.5);
    animation: bob 2s ease-in-out infinite;
  }
  @keyframes bob { 50% { transform: translateY(-10px); } }
  .title-screen .big-sprite img { width: 130px; height: 130px; }
  .press-start {
    margin-top: 16px; font-size: 10px;
    animation: blink 1s infinite;
  }
  @keyframes blink { 50% { opacity: 0.3; } }

  /* Intro */
  .intro {
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at center, #2a2a3a 0%, #0c0c14 100%);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 24px; text-align: center; color: #fff;
  }
  .intro .prof-sprite {
    width: 140px; height: 140px;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 14px;
    font-size: 90px;
    filter: drop-shadow(0 0 20px rgba(255,216,48,0.5));
  }
  .intro h2 { font-size: 13px; margin-bottom: 12px; color: #ffd030; text-shadow: 2px 2px 0 #401010; }
  .intro p { font-size: 9px; line-height: 1.9; max-width: 600px; min-height: 60px; }

  /* Starter choice */
  .starters {
    position: absolute; inset: 0;
    background: linear-gradient(180deg, #2a3a20 0%, #1a2a18 100%);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 16px;
  }
  .starters h2 {
    color: #ffd030; font-size: 11px; margin-bottom: 14px;
    text-shadow: 2px 2px 0 #000;
  }
  .starter-row { display: flex; gap: 16px; }
  .starter {
    width: 160px;
    background: var(--fr-cream);
    border: 3px solid var(--fr-brown);
    border-radius: 8px;
    padding: 12px;
    cursor: pointer;
    text-align: center;
    transition: transform 0.15s;
    color: var(--fr-dark);
  }
  .starter:hover { transform: translateY(-8px); border-color: var(--fr-red); box-shadow: 0 8px 0 rgba(0,0,0,0.3); }
  .starter img { width: 90px; height: 90px; }
  .starter .nm { font-size: 10px; margin-top: 4px; }
  .starter .tp { font-size: 8px; margin-top: 4px; }
  .starter .desc { font-size: 7px; margin-top: 6px; line-height: 1.5; color: #604020; }

  /* OVERWORLD — big scrolling map */
  #viewport {
    position: absolute; inset: 0;
    overflow: hidden;
    background: #111;
  }
  #world {
    position: absolute;
    top: 0; left: 0;
    display: grid;
    grid-auto-flow: row;
    transition: transform 0.14s linear;
  }
  .tile {
    position: relative;
    width: 48px; height: 48px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
  }
  .tile.grass { background: #58a048; background-image: repeating-linear-gradient(45deg, #58a048 0 5px, #68b050 5px 10px); }
  .tile.tall-grass { background: #1e5028; background-image: repeating-linear-gradient(45deg, #1e5028 0 4px, #2d6838 4px 8px); color: #0f2a14; }
  .tile.path { background: #d8b878; background-image: repeating-linear-gradient(90deg, #d8b878 0 8px, #c8a868 8px 12px); }
  .tile.water { background: #4080c8; background-image: linear-gradient(180deg, #5090d8 0%, #3070b8 100%); }
  .tile.water::after { content: '〰'; color: rgba(255,255,255,0.4); font-size: 12px; }
  .tile.tree {
    background: #184818;
    background-image: radial-gradient(circle at 50% 40%, #286030 0 60%, transparent 60%),
                      radial-gradient(circle at 50% 50%, #1a3818 0 70%, transparent 70%);
  }
  .tile.tree::after { content: ''; }
  .tile.rock { background: #888888; background-image: radial-gradient(circle at 40% 40%, #aaa 0 40%, #666 60%, #444 100%); }
  .tile.flower { background: #58a048; }
  .tile.flower::after { content: '🌸'; font-size: 14px; }
  .tile.sand { background: #e8d098; background-image: repeating-linear-gradient(90deg, #e8d098 0 6px, #dcc488 6px 10px); }
  .tile.building-roof {
    background: linear-gradient(180deg, #c04040 0%, #802020 100%);
    border: 2px solid #401010;
  }
  .tile.building-wall {
    background: #d8c090;
    border: 2px solid #604020;
    color: #402818; font-size: 10px;
  }
  .tile.door {
    background: #401810;
    border: 2px solid #604020;
  }
  .tile.door::after { content: ''; position: absolute; width: 4px; height: 4px; background: #ffd030; right: 20%; top: 50%; border-radius: 50%; }
  .tile.sign {
    background: #58a048;
  }
  .tile.sign::after { content: '📜'; font-size: 18px; }
  .tile.ledge {
    background: #58a048;
    border-bottom: 4px solid #2a5a20;
  }
  .tile.cave {
    background: #2a2a3a;
    background-image: radial-gradient(circle at 50% 50%, #1a1a2a 0 50%, #000 100%);
    color: #aaa; font-size: 10px;
  }
  .tile.pokecenter-roof { background: linear-gradient(180deg, #e04040 0%, #a02020 100%); border: 2px solid #401010; box-shadow: inset 0 0 12px #ffaa00, 0 0 8px rgba(255,160,0,0.5); animation: gentleGlow 2.5s ease-in-out infinite; }
  .tile.pokecenter-roof::after { content: 'P'; color: #fff; font-weight: bold; font-size: 16px; text-shadow: 1px 1px 0 #000; }
  .tile.pokemart-roof { background: linear-gradient(180deg, #4080c8 0%, #2060a0 100%); border: 2px solid #102040; box-shadow: inset 0 0 12px #60e8ff, 0 0 6px rgba(96,232,255,0.4); animation: gentleGlow 2.5s ease-in-out infinite; }
  .tile.pokemart-roof::after { content: '🛒'; font-size: 16px; }
  .tile.lab-roof { background: linear-gradient(180deg, #6090c0 0%, #406080 100%); border: 2px solid #102030; box-shadow: inset 0 0 12px #ffd030, 0 0 6px rgba(255,208,48,0.5); animation: gentleGlow 2.5s ease-in-out infinite; }
  .tile.lab-roof::after { content: '🔬'; font-size: 14px; }
  .tile.gym-roof { background: linear-gradient(180deg, #806040 0%, #604028 100%); border: 2px solid #2a1a10; box-shadow: inset 0 0 10px #ffd030, 0 0 8px rgba(255,208,48,0.6); animation: gentleGlow 2.5s ease-in-out infinite; }
  .tile.gym-roof::after { content: '🏛️'; font-size: 14px; }
  .tile.race-roof    { background: linear-gradient(180deg, #e03030 0%, #a01020 100%); border: 2px solid #401010; box-shadow: inset 0 0 10px #ffe040, 0 0 10px rgba(255,224,64,0.6); animation: gentleGlow 2.5s ease-in-out infinite; }
  .tile.race-roof::after { content: '🏎️'; font-size: 16px; }
  .tile.sudoku-roof  { background: linear-gradient(180deg, #4080c8 0%, #204080 100%); border: 2px solid #102040; box-shadow: inset 0 0 10px #80c0ff, 0 0 10px rgba(128,192,255,0.6); animation: gentleGlow 2.5s ease-in-out infinite; }
  .tile.sudoku-roof::after  { content: '🧩'; font-size: 16px; }
  .tile.memory-roof  { background: linear-gradient(180deg, #c040e0 0%, #601080 100%); border: 2px solid #200040; box-shadow: inset 0 0 10px #ff80ff, 0 0 10px rgba(255,128,255,0.6); animation: gentleGlow 2.5s ease-in-out infinite; }
  .tile.memory-roof::after  { content: '🃏'; font-size: 16px; }
  .tile.escape-roof  { background: linear-gradient(180deg, #c08020 0%, #805010 100%); border: 2px solid #402010; box-shadow: inset 0 0 10px #ffd030, 0 0 10px rgba(255,208,48,0.6); animation: gentleGlow 2.5s ease-in-out infinite; }
  .tile.escape-roof::after  { content: '🔐'; font-size: 16px; }
  .tile.family-roof { background: linear-gradient(45deg, #ff70a0, #ffd030, #70e0ff, #a070ff); background-size: 400% 400%; border: 2px solid #4a1050; animation: familyShimmer 3s ease infinite; box-shadow: 0 0 14px rgba(255,200,255,0.7); }
  .tile.family-roof::after { content: '⭐'; font-size: 16px; filter: drop-shadow(0 0 4px white); }
  @keyframes familyShimmer {
    0%,100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
  }
  .tile.floor { background: #c8b090; background-image: repeating-linear-gradient(90deg, #c8b090 0 10px, #b89878 10px 12px); }
  .tile.wall { background: #7a5030; border: 1px solid #4a3018; }
  .tile.carpet { background: #d04040; background-image: repeating-linear-gradient(90deg, #d04040 0 8px, #b83030 8px 10px); }
  .tile.counter { background: #a87048; border-top: 3px solid #6a4028; }
  .tile.exit-mat { background: #2a6030; color: #fff; font-size: 10px; }
  .tile.exit-mat::after { content: '⬆'; color: #fff; font-size: 14px; }
  @keyframes gentleGlow {
    0%, 100% { filter: brightness(1); }
    50% { filter: brightness(1.2); }
  }
  .tile.fence {
    background: #58a048;
    background-image: linear-gradient(90deg, transparent 40%, #8b6838 40% 60%, transparent 60%),
                      linear-gradient(180deg, transparent 20%, #8b6838 20% 30%, transparent 30%, transparent 60%, #8b6838 60% 70%, transparent 70%);
  }
  .tile.npc { background: #d8b878; }

  /* NPCs and player on world layer */
  .entity {
    position: absolute;
    width: 48px; height: 48px;
    display: flex; align-items: center; justify-content: center;
    font-size: 32px;
    pointer-events: none;
    z-index: 10;
    filter: drop-shadow(2px 3px 2px rgba(0,0,0,0.6));
    transition: left 0.14s linear, top 0.14s linear;
  }
  #player svg { width: 40px; height: 44px; }
  .entity.npc > div { animation: bob-slow 2.5s ease-in-out infinite; }
  .entity.npc { z-index: 5; animation: bob-slow 3s ease-in-out infinite; }
  @keyframes bob-slow { 50% { transform: translateY(-3px); } }

  .location-toast {
    position: absolute;
    top: 16px; left: 50%;
    transform: translateX(-50%);
    background: var(--fr-cream);
    border: 3px solid var(--fr-brown);
    padding: 8px 16px;
    font-size: 9px;
    color: var(--fr-dark);
    z-index: 50;
    border-radius: 6px;
    box-shadow: 0 4px 8px rgba(0,0,0,0.4);
    animation: toastShow 3s forwards;
  }
  @keyframes toastShow {
    0% { opacity: 0; transform: translate(-50%, -20px); }
    15%, 70% { opacity: 1; transform: translate(-50%, 0); }
    100% { opacity: 0; transform: translate(-50%, -20px); }
  }

  .minimap-label {
    position: absolute;
    top: 10px; right: 10px;
    background: rgba(0,0,0,0.7);
    color: #fff;
    font-size: 8px;
    padding: 5px 8px;
    z-index: 40;
    border-radius: 4px;
    border: 1px solid #555;
  }

  /* BATTLE */
  .battle {
    position: absolute; inset: 0;
    background:
      linear-gradient(180deg, #98d8f8 0%, #98d8f8 45%, #58a848 45%, #48983c 100%);
    overflow: hidden;
  }
  .battle-scene-transition {
    position: absolute; inset: 0;
    background: #000;
    z-index: 100;
    animation: sceneFade 0.8s forwards;
    pointer-events: none;
  }
  @keyframes sceneFade {
    0% { opacity: 1; clip-path: circle(0% at 50% 50%); }
    100% { opacity: 0; clip-path: circle(100% at 50% 50%); }
  }
  .enemy-platform, .player-platform {
    position: absolute;
    width: 220px; height: 46px;
    border-radius: 50%;
    background: radial-gradient(ellipse at center, rgba(88,48,24,0.5) 0%, transparent 70%);
  }
  .enemy-platform { top: 130px; right: 40px; }
  .player-platform { bottom: 50px; left: 40px; }

  .enemy-area, .player-area { position: absolute; }
  .enemy-area { top: 50px; right: 80px; }
  .player-area { bottom: 80px; left: 50px; }

  .mon-sprite {
    width: 150px; height: 150px;
    filter: drop-shadow(3px 5px 3px rgba(0,0,0,0.4));
    transition: transform 0.2s, opacity 0.3s;
  }
  .mon-sprite.small { width: 120px; height: 120px; }
  .mon-sprite.appear { animation: appear 0.6s; }
  .mon-sprite.shake { animation: shake 0.4s; }
  .mon-sprite.hit { animation: hit 0.6s; }
  .mon-sprite.faint { animation: faint 0.9s forwards; }
  .mon-sprite.attack-forward { animation: attackFwd 0.4s; }
  .mon-sprite.attack-back { animation: attackBack 0.4s; }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20% { transform: translateX(-12px); }
    40% { transform: translateX(12px); }
    60% { transform: translateX(-10px); }
    80% { transform: translateX(10px); }
  }
  @keyframes hit {
    0%,100% { opacity: 1; }
    20% { opacity: 0.1; filter: drop-shadow(0 0 10px red) brightness(2); }
    40% { opacity: 1; }
    60% { opacity: 0.1; filter: drop-shadow(0 0 10px red) brightness(2); }
    80% { opacity: 1; }
  }
  @keyframes faint {
    to { transform: translateY(90px) scale(0.4); opacity: 0; }
  }
  @keyframes appear {
    from { transform: scale(0.3); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }
  @keyframes attackFwd {
    0%,100% { transform: translateX(0); }
    50% { transform: translateX(60px) scale(1.08); }
  }
  @keyframes attackBack {
    0%,100% { transform: translateX(0); }
    50% { transform: translateX(-60px) scale(1.08); }
  }

  .mon-info {
    position: absolute;
    background: var(--fr-cream);
    border: 3px solid var(--fr-brown);
    border-radius: 6px;
    padding: 7px 12px;
    min-width: 220px;
    color: var(--fr-dark);
    font-size: 9px;
    box-shadow: 2px 3px 0 #401818;
  }
  .enemy-info { top: 30px; left: 30px; }
  .player-info { bottom: 30px; right: 30px; }
  .mon-info .nm { display: flex; justify-content: space-between; margin-bottom: 4px; font-size: 10px; }
  .hpbar-label { font-size: 7px; color: #d03030; margin-right: 4px; display: inline-block; vertical-align: middle; }
  .hpbar {
    display: inline-block; vertical-align: middle;
    width: calc(100% - 30px);
    background: #400; height: 10px;
    border-radius: 2px; overflow: hidden;
    border: 1px solid #200;
  }
  .hpbar-fill { height: 100%; background: #30c030; transition: width 0.6s ease-out, background 0.3s; }
  .hp-text { font-size: 8px; margin-top: 3px; text-align: right; }
  .xpbar { width: 100%; background: #222; height: 3px; border-radius: 1px; margin-top: 3px; overflow: hidden; }
  .xpbar-fill { height: 100%; background: #40a8f0; transition: width 0.5s; }

  /* Attack animations */
  .move-fx {
    position: absolute;
    pointer-events: none;
    z-index: 15;
    font-size: 32px;
  }
  .move-particle {
    position: absolute;
    font-size: 24px;
    pointer-events: none;
  }
  .fx-impact {
    position: absolute;
    font-size: 48px;
    pointer-events: none;
    z-index: 16;
    animation: impactPulse 0.5s forwards;
  }
  @keyframes impactPulse {
    0% { transform: scale(0) rotate(0); opacity: 1; }
    50% { transform: scale(1.5) rotate(180deg); opacity: 1; }
    100% { transform: scale(2) rotate(360deg); opacity: 0; }
  }
  @keyframes projectileToEnemy {
    0% { left: 180px; top: 280px; opacity: 0; transform: scale(0.5); }
    20% { opacity: 1; }
    100% { left: 560px; top: 130px; opacity: 1; transform: scale(1.2); }
  }
  @keyframes projectileToPlayer {
    0% { left: 560px; top: 130px; opacity: 0; transform: scale(0.5); }
    20% { opacity: 1; }
    100% { left: 180px; top: 280px; opacity: 1; transform: scale(1.2); }
  }
  .fx-slash {
    position: absolute;
    width: 180px; height: 180px;
    pointer-events: none;
    z-index: 16;
    background: linear-gradient(45deg, transparent 40%, #fff 48%, #fff 52%, transparent 60%);
    animation: slashAnim 0.4s forwards;
  }
  @keyframes slashAnim {
    0% { transform: scale(0.5) rotate(-45deg); opacity: 0; }
    50% { opacity: 1; }
    100% { transform: scale(1.5) rotate(45deg); opacity: 0; }
  }
  .fx-flash {
    position: absolute; inset: 0;
    background: #fff;
    z-index: 14;
    pointer-events: none;
    animation: flashAttack 0.3s forwards;
  }
  @keyframes flashAttack {
    0%,100% { opacity: 0; }
    50% { opacity: 0.7; }
  }
  .fx-shake-screen { animation: screenShake 0.5s; }
  @keyframes screenShake {
    0%,100% { transform: translate(0,0); }
    20% { transform: translate(-4px, 3px); }
    40% { transform: translate(4px, -3px); }
    60% { transform: translate(-3px, -3px); }
    80% { transform: translate(3px, 3px); }
  }

  /* Pokeball */
  .pokeball-anim {
    position: absolute;
    width: 40px; height: 40px;
    z-index: 20;
    background:
      linear-gradient(180deg, #e03030 0 48%, #222 48% 52%, #fff 52% 100%);
    border-radius: 50%;
    border: 3px solid #222;
    box-shadow: inset 0 -4px 0 rgba(0,0,0,0.3), 0 3px 5px rgba(0,0,0,0.5);
  }
  .pokeball-anim::after {
    content: '';
    position: absolute;
    top: 40%; left: 40%;
    width: 20%; height: 20%;
    background: #fff;
    border: 2px solid #222;
    border-radius: 50%;
  }
  .pokeball-anim.throw { animation: throwball 0.9s forwards; }
  .pokeball-anim.wiggle { animation: wiggle 0.6s infinite; }
  @keyframes throwball {
    0% { left: 70px; top: 340px; transform: rotate(0deg) scale(0.7); }
    40% { left: 340px; top: 100px; transform: rotate(360deg) scale(1); }
    70% { left: 520px; top: 110px; transform: rotate(720deg) scale(1); }
    100% { left: 520px; top: 160px; transform: rotate(720deg) scale(1); }
  }
  @keyframes wiggle {
    0%,100% { transform: rotate(-20deg); }
    50% { transform: rotate(20deg); }
  }

  /* Dialog box - Fire Red style */
  #ui {
    background: #f8f8f8;
    padding: 10px;
    min-height: 130px;
    border-top: 4px solid #401010;
    background-image: linear-gradient(180deg, #fff 0%, #e8e8e8 100%);
  }
  #message {
    background: #fff;
    padding: 12px 14px;
    border: 4px solid var(--fr-brown);
    border-radius: 8px;
    min-height: 60px;
    font-size: 10px;
    line-height: 1.8;
    color: var(--fr-dark);
    position: relative;
    box-shadow: inset 0 0 0 2px #fff, 2px 3px 0 #401818;
  }
  #message::after {
    content: '▼';
    position: absolute;
    right: 12px; bottom: 6px;
    color: var(--fr-red);
    font-size: 10px;
    animation: arrow 0.7s infinite;
  }
  #message.no-arrow::after { display: none; }
  @keyframes arrow { 50% { opacity: 0; } }

  #actions {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 6px;
    margin-top: 8px;
  }
  .btn {
    background: #fff;
    border: 3px solid var(--fr-brown);
    color: var(--fr-dark);
    padding: 10px 6px;
    font-family: inherit;
    font-size: 9px;
    cursor: pointer;
    border-radius: 6px;
    transition: all 0.1s;
    text-transform: uppercase;
    letter-spacing: 1px;
    box-shadow: 2px 2px 0 #401818;
  }
  .btn:hover:not(:disabled) {
    background: var(--fr-red); color: #fff; border-color: #401010;
    transform: translate(1px, 1px);
    box-shadow: 1px 1px 0 #401818;
  }
  .btn:active:not(:disabled) { transform: translate(2px, 2px); box-shadow: none; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn.back { grid-column: span 2; background: #d8d8d8; }
  .btn.primary { background: var(--fr-red); color: #fff; border-color: #401010; }

  /* Party */
  .party-screen {
    position: absolute; inset: 0;
    background: linear-gradient(180deg, #4080c8 0%, #2060a0 100%);
    padding: 14px;
    overflow-y: auto;
  }
  .party-screen h2 {
    color: #fff; font-size: 11px; margin-bottom: 10px;
    text-shadow: 2px 2px 0 #000;
  }
  .party-list { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
  .party-mon {
    background: var(--fr-cream);
    border: 3px solid var(--fr-brown);
    border-radius: 6px;
    padding: 8px;
    display: flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
    color: var(--fr-dark);
  }
  .party-mon:hover { border-color: var(--fr-red); }
  .party-mon.active { border-color: #ffd030; background: #fff0c0; box-shadow: 0 0 8px #ffd030; }
  .party-mon.fainted { opacity: 0.45; }
  .party-mon img { width: 56px; height: 56px; }
  .party-mon .info { flex: 1; font-size: 8px; line-height: 1.5; }
  .party-mon .info .n { font-size: 9px; margin-bottom: 2px; }

  .type-pill {
    display: inline-block;
    padding: 2px 5px;
    border-radius: 3px;
    font-size: 7px;
    color: #fff;
    margin-left: 2px;
    text-shadow: 1px 1px 0 rgba(0,0,0,0.5);
  }
  .type-fire { background: #f08030; }
  .type-water { background: #6890f0; }
  .type-grass { background: #78c850; }
  .type-electric { background: #f8d030; color: #333; text-shadow: none; }
  .type-normal { background: #a8a878; }
  .type-bug { background: #a8b820; }
  .type-poison { background: #a040a0; }
  .type-ground { background: #e0c068; color: #333; text-shadow: none; }
  .type-flying { background: #a890f0; }
  .type-psychic { background: #f85888; }
  .type-rock { background: #b8a038; }
  .type-fairy { background: #ee99ac; color: #333; text-shadow: none; }
  .type-dragon { background: #7038f8; }
  .type-dark { background: #705848; }
  .type-ghost { background: #705898; }
  .type-steel { background: #b8b8d0; color: #333; text-shadow: none; }
  .type-ice { background: #98d8d8; color: #333; text-shadow: none; }
  .type-fighting { background: #c03028; }

  .fade-in { animation: fadein 0.5s; }
  @keyframes fadein { from { opacity: 0; } to { opacity: 1; } }

  .hint {
    position: absolute;
    bottom: 10px; left: 50%; transform: translateX(-50%);
    font-size: 7px; color: #fff;
    background: rgba(0,0,0,0.6);
    padding: 5px 10px; border-radius: 4px;
    z-index: 30;
  }

  /* Account / login screens */
  .login-screen {
    position: absolute; inset: 0;
    background: linear-gradient(180deg, #1a2a4a 0%, #0a1a2a 100%);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 20px; color: #fff;
  }
  .login-screen h2 {
    color: #ffd030; font-size: 13px; margin-bottom: 14px;
    text-shadow: 2px 2px 0 #000;
  }
  .login-card {
    background: var(--fr-cream);
    border: 3px solid var(--fr-brown);
    border-radius: 8px;
    padding: 18px;
    width: 360px;
    color: var(--fr-dark);
    box-shadow: 4px 4px 0 #401010;
  }
  .login-card label {
    display: block; font-size: 8px; margin-bottom: 4px; color: var(--fr-brown);
  }
  .login-card input {
    width: 100%;
    padding: 8px;
    font-family: inherit;
    font-size: 10px;
    border: 2px solid var(--fr-brown);
    border-radius: 4px;
    background: #fff;
    margin-bottom: 10px;
    outline: none;
    color: var(--fr-dark);
  }
  .login-card input:focus { border-color: var(--fr-red); }
  .login-msg {
    font-size: 8px; color: #c02020; margin-top: 6px; min-height: 12px;
    text-align: center; line-height: 1.5;
  }
  .login-msg.success { color: #206020; }
  .account-status {
    margin-top: 10px; font-size: 7px; color: #fff;
    background: rgba(0,0,0,0.5);
    padding: 6px 10px; border-radius: 4px;
  }

  #accountBadge {
    background: rgba(255,255,255,0.15);
    padding: 3px 6px;
    border-radius: 3px;
    margin-right: 6px;
    font-size: 8px;
  }
  #accountBadge.online { background: #30a040; color: #fff; }

  .cloud-indicator {
    position: fixed;
    top: 16px; right: 16px;
    background: #30a040;
    color: #fff;
    font-size: 9px;
    padding: 6px 10px;
    border-radius: 4px;
    z-index: 200;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
  }
  .cloud-indicator.show { opacity: 1; }

  /* Evolution screen */
  .evo-screen {
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at center, #1a1a2a 0%, #000 100%);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    color: #fff;
    overflow: hidden;
  }
  .evo-stars {
    position: absolute; inset: 0;
    background-image:
      radial-gradient(circle at 10% 20%, #fff 1px, transparent 2px),
      radial-gradient(circle at 80% 30%, #fff 1px, transparent 2px),
      radial-gradient(circle at 40% 70%, #fff 1px, transparent 2px),
      radial-gradient(circle at 70% 80%, #fff 1px, transparent 2px),
      radial-gradient(circle at 25% 85%, #fff 1px, transparent 2px),
      radial-gradient(circle at 90% 10%, #fff 1px, transparent 2px);
    opacity: 0.7;
    animation: twinkle 2s infinite alternate;
  }
  @keyframes twinkle { to { opacity: 0.3; } }

  .evo-wrap {
    position: relative;
    width: 220px; height: 220px;
    display: flex; align-items: center; justify-content: center;
  }
  .evo-sprite {
    position: absolute;
    width: 180px; height: 180px;
    filter: drop-shadow(3px 5px 4px rgba(0,0,0,0.6));
    transition: transform 0.3s;
  }
  .evo-sprite.white-out {
    animation: whiteOut 2s infinite;
  }
  @keyframes whiteOut {
    0%,100% { filter: brightness(1) drop-shadow(0 0 0 transparent); transform: scale(1); }
    50% { filter: brightness(20) drop-shadow(0 0 30px #fff); transform: scale(1.1); }
  }
  .evo-sprite.morph {
    animation: morphStretch 0.6s infinite alternate;
  }
  @keyframes morphStretch {
    0% { transform: scaleY(1); }
    100% { transform: scaleY(0.85) scaleX(1.08); }
  }
  .evo-sprite.hidden { opacity: 0; }

  .evo-flash-full {
    position: absolute; inset: 0;
    background: #fff;
    animation: evoFlashFull 0.6s forwards;
    z-index: 50;
  }
  @keyframes evoFlashFull {
    0% { opacity: 0; }
    50% { opacity: 1; }
    100% { opacity: 0; }
  }

  .evo-title {
    font-size: 14px;
    color: #ffd030;
    text-shadow: 2px 2px 0 #401010;
    margin-bottom: 20px;
    letter-spacing: 2px;
  }
  .evo-caption {
    font-size: 10px;
    margin-top: 20px;
    line-height: 1.8;
    text-align: center;
    max-width: 480px;
    padding: 0 20px;
  }

  /* MINI-GAMES */
  .minigame-screen {
    position: absolute; inset: 0;
    background: #000;
    overflow: hidden;
  }
  #raceCanvas { display: block; width: 100%; height: 100%; background: #70a0d0; }
  .race-hud {
    position: absolute; top: 8px; left: 8px;
    background: rgba(0,0,0,0.7);
    color: #fff; font-size: 10px;
    padding: 6px 10px; border-radius: 6px;
    z-index: 10;
  }
  .race-hud b { color: #ffd030; }
  .sudoku-board {
    display: grid; grid-template-columns: repeat(4, 1fr);
    gap: 3px; max-width: 320px; margin: 0 auto;
    background: #222; padding: 6px; border-radius: 8px;
  }
  .sudoku-row-3 { border-right: 3px solid #666 !important; }
  .sudoku-col-3 { border-bottom: 3px solid #666 !important; }
  .sudoku-cell {
    background: #fff; aspect-ratio: 1; display: flex;
    align-items: center; justify-content: center;
    font-size: 20px; cursor: pointer; user-select: none;
    color: #202830; border-radius: 4px;
    transition: background 0.15s;
  }
  .sudoku-cell.fixed { background: #e0e0e0; color: #000; font-weight: bold; cursor: default; }
  .sudoku-cell.selected { background: #ffd030; }
  .sudoku-cell.wrong { background: #f08080; }
  .sudoku-cell.correct-set { background: #60c060; color: #fff; }
  .sudoku-numpad {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px;
    max-width: 320px; margin: 10px auto 0;
  }
  .sudoku-numpad button {
    background: #4080c8; color: #fff; border: 2px solid #204080;
    border-radius: 6px; padding: 10px; font-family: inherit;
    font-size: 16px; font-weight: bold; cursor: pointer;
    box-shadow: 0 2px 0 #204080;
  }
  .sudoku-numpad button:active { transform: translateY(2px); box-shadow: 0 0 0 #204080; }

  .memory-board {
    display: grid; gap: 6px; max-width: 440px; margin: 0 auto;
    background: #222; padding: 8px; border-radius: 8px;
  }
  .memory-card {
    aspect-ratio: 1;
    background: #4080c8;
    background-image: radial-gradient(circle at 30% 30%, #60a0e0, #205090);
    border: 2px solid #204080;
    border-radius: 6px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    position: relative;
    transition: transform 0.3s;
    transform-style: preserve-3d;
  }
  .memory-card.flipped { transform: rotateY(180deg); background: #fff8e0; }
  .memory-card img { width: 80%; height: 80%; object-fit: contain; transform: rotateY(180deg); }
  .memory-card.matched { border-color: #60c060; box-shadow: 0 0 12px #60c060; }

  .escape-panel {
    background: var(--fr-cream); border: 4px solid var(--fr-brown);
    border-radius: 8px; padding: 14px; max-width: 480px; margin: 0 auto;
    color: var(--fr-dark); font-size: 10px; line-height: 1.7;
  }
  .escape-panel h3 { color: #c02020; margin-bottom: 8px; font-size: 12px; }
  .escape-progress {
    display: flex; gap: 6px; justify-content: center; margin-bottom: 10px;
  }
  .escape-progress .dot {
    width: 20px; height: 20px; border-radius: 50%;
    background: #666; border: 2px solid #333;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; color: #fff;
  }
  .escape-progress .dot.done { background: #60c060; }
  .escape-progress .dot.current { background: #ffd030; color: #333; }

  .speak-btn, .mic-btn {
    background: #4080c8; color: #fff;
    border: 2px solid #204080;
    border-radius: 50%;
    width: 36px; height: 36px;
    font-size: 16px;
    cursor: pointer;
    font-family: inherit;
    transition: transform 0.15s, background 0.15s;
    box-shadow: 0 2px 0 #204080;
  }
  .speak-btn:hover, .mic-btn:hover { background: #60a0e0; transform: translateY(-1px); }
  .speak-btn:active, .mic-btn:active { transform: translateY(1px); box-shadow: 0 0 0 #204080; }
  .speak-btn.speaking { background: #60c060; animation: pulseSpeak 0.6s ease-in-out infinite; }
  .mic-btn { background: #c04060; border-color: #801030; box-shadow: 0 2px 0 #801030; }
  .mic-btn:hover { background: #e06080; }
  .mic-btn.listening { background: #c04060; animation: pulseSpeak 0.4s ease-in-out infinite; }
  @keyframes pulseSpeak {
    0%, 100% { transform: scale(1); box-shadow: 0 0 0 rgba(96,192,96,0.5); }
    50% { transform: scale(1.1); box-shadow: 0 0 12px rgba(96,192,96,0.8); }
  }

  .sparkle {
    position: absolute;
    font-size: 18px;
    pointer-events: none;
    animation: sparkFly 1.2s forwards;
  }
  @keyframes sparkFly {
    0% { opacity: 0; transform: translate(0,0) scale(0.3); }
    30% { opacity: 1; }
    100% { opacity: 0; transform: translate(var(--dx,40px), var(--dy,-40px)) scale(1.2); }
  }

  /* Mobile D-pad */
  #dpad {
    position: fixed;
    bottom: 16px; left: 16px;
    z-index: 9999;
    display: none;
    grid-template-columns: repeat(3, 64px);
    grid-template-rows: repeat(3, 64px);
    gap: 4px;
    user-select: none;
    -webkit-user-select: none;
    touch-action: none;
    pointer-events: auto;
  }
  .dpad-btn {
    background: rgba(20,20,30,0.85);
    border: 3px solid rgba(255,255,255,0.5);
    color: #fff;
    font-size: 26px;
    font-weight: bold;
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
    -webkit-tap-highlight-color: transparent;
    touch-action: none;
    box-shadow: 0 3px 0 rgba(0,0,0,0.6), 0 6px 12px rgba(0,0,0,0.5);
  }
  .dpad-btn:active { background: rgba(224,48,40,0.9); transform: translateY(2px); box-shadow: 0 1px 0 rgba(0,0,0,0.6); }
  .dpad-up    { grid-column: 2; grid-row: 1; }
  .dpad-left  { grid-column: 1; grid-row: 2; }
  .dpad-center{ grid-column: 2; grid-row: 2; background: rgba(255,208,48,0.5); font-size: 18px; border-style: dashed; }
  .dpad-right { grid-column: 3; grid-row: 2; }
  .dpad-down  { grid-column: 2; grid-row: 3; }
  #actionBtn {
    position: fixed;
    bottom: 32px; right: 20px;
    width: 84px; height: 84px;
    background: linear-gradient(180deg, #e03030, #a02020);
    color: #fff;
    font-family: inherit; font-size: 16px; font-weight: bold;
    border: 4px solid #401010;
    border-radius: 50%;
    display: none;
    align-items: center; justify-content: center;
    z-index: 9999;
    box-shadow: 0 5px 0 #401010, 0 8px 18px rgba(0,0,0,0.6);
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }
  #actionBtn:active { transform: translateY(4px); box-shadow: 0 1px 0 #401010, 0 4px 8px rgba(0,0,0,0.5); }

  /* ALWAYS show D-pad on touch devices OR small screens — no JS detection needed */
  @media (pointer: coarse), (hover: none), (max-width: 900px) {
    #dpad { display: grid !important; }
    #actionBtn { display: flex !important; }
  }

  /* MATH / QUIZ MODAL */
  .modal-overlay {
    position: absolute; inset: 0;
    background: rgba(0,0,0,0.75);
    display: flex; align-items: center; justify-content: center;
    z-index: 400;
    padding: 16px;
  }
  .modal {
    background: #fff;
    border: 4px solid #401010;
    border-radius: 14px;
    padding: 18px;
    width: 100%; max-width: 520px;
    color: #222;
    box-shadow: 0 10px 30px rgba(0,0,0,0.6);
    animation: popIn 0.3s ease-out;
  }
  @keyframes popIn {
    0% { transform: scale(0.6); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }
  .modal h3 {
    font-size: 12px;
    color: #e03028;
    margin-bottom: 8px;
    text-align: center;
    text-transform: uppercase;
  }
  .modal .subtitle {
    font-size: 9px;
    color: #666;
    margin-bottom: 14px;
    text-align: center;
    line-height: 1.7;
  }
  .math-question {
    font-size: 26px;
    text-align: center;
    padding: 14px;
    background: #fff8e0;
    border: 3px dashed #f0a030;
    border-radius: 10px;
    margin-bottom: 14px;
    color: #402818;
    letter-spacing: 3px;
    font-weight: bold;
  }
  .choices {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 8px;
  }
  .choice-btn {
    background: #fff;
    border: 3px solid var(--fr-brown);
    color: var(--fr-dark);
    padding: 14px 8px;
    font-family: inherit;
    font-size: 14px;
    cursor: pointer;
    border-radius: 8px;
    transition: all 0.12s;
    box-shadow: 2px 2px 0 #401818;
    font-weight: bold;
  }
  .choice-btn:hover:not(:disabled) {
    background: #ffd030; transform: translate(1px, 1px);
    box-shadow: 1px 1px 0 #401818;
  }
  .choice-btn.correct {
    background: #60c040; color: #fff; border-color: #205020;
  }
  .choice-btn.wrong {
    background: #e04040; color: #fff; border-color: #601010;
  }
  .choice-btn:disabled { cursor: default; }
  .modal-result {
    margin-top: 12px;
    padding: 10px;
    border-radius: 8px;
    font-size: 10px;
    line-height: 1.7;
    text-align: center;
    min-height: 18px;
  }
  .modal-result.good { background: #e0ffe0; color: #205020; }
  .modal-result.bad { background: #ffe0e0; color: #801010; }

  /* Trainer portrait */
  .trainer-intro {
    position: absolute; inset: 0;
    background: linear-gradient(180deg, #2a1a4a 0%, #0a0a1a 100%);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 16px; color: #fff; text-align: center;
  }
  .trainer-portrait {
    width: 140px; height: 140px;
    border: 4px solid #ffd030;
    border-radius: 50%;
    object-fit: cover;
    background: #333;
    box-shadow: 0 0 30px rgba(255,208,48,0.5);
    margin-bottom: 10px;
  }
  .trainer-name { font-size: 14px; color: #ffd030; text-shadow: 2px 2px 0 #401010; margin-bottom: 4px; }
  .trainer-role { font-size: 8px; color: #b8b8d0; margin-bottom: 16px; }
  .trainer-fact {
    font-size: 9px; line-height: 1.8;
    max-width: 540px; background: rgba(255,255,255,0.1);
    padding: 12px 16px; border-radius: 8px;
    border-left: 4px solid #ffd030;
  }

  @media (max-width: 720px) {
    body { padding: 0; }
    #game { width: 100vw; border-radius: 0; border: none; }
    #screen { height: 55vh; min-height: 380px; }
    #header { font-size: 8px; padding: 8px 10px; }
    #title { font-size: 8px; }
    #stats { font-size: 7px; }
    .btn { font-size: 9px; padding: 10px 4px; }
    #message { font-size: 10px; }
    .math-question { font-size: 22px; }
    .choice-btn { font-size: 13px; padding: 12px 6px; }
    .title-screen h1 { font-size: 20px; }
    /* Make room at bottom for D-pad so it doesn't cover the UI */
    #ui { padding-bottom: 100px; }
  }
</style>
</head>
<body>
<div id="game">
  <div id="header">
    <div id="title">🎮 NOAH'S SINNOH ADVENTURE</div>
    <div id="stats">
      <span id="accountBadge">👤 Guest</span>
      💰<span id="money">500</span>
      ⚪<span id="ballCount">10</span>
      📕<span id="caughtCount">0</span>
      <button id="headerSave" title="Save your game" style="background:#ffd030;color:#402000;border:2px solid #604020;border-radius:4px;padding:3px 6px;font-family:inherit;font-size:8px;margin-left:6px;cursor:pointer;">💾 SAVE</button>
    </div>
  </div>
  <div id="screen"></div>
  <div id="ui">
    <div id="message">Loading Sinnoh region...</div>

// Compact helper to add 100 more historians without giant repetitive blocks
function H(id, initials, color, name, role, fact, qQ, qA, qOther, team) {
  // qOther is 3 wrong answers; qA is correct (placed first then shuffled at quiz-time)
  TRAINERS.push({
    id, initials, color, name, role, fact,
    quiz: { q: qQ, choices: [qA, ...qOther], answer: 0 },
    team: team.map(([pid, lvl]) => ({ id: pid, level: lvl })),
  });
}

H('cleopatra', 'CL', '8a6030', 'Cleopatra', 'Queen of Egypt (69–30 BCE)',

H('caesar', 'JC', '604030', 'Julius Caesar', 'Roman Leader (100–44 BCE)',

// ---------- EXPLORERS (8) ----------
H('columbus', 'CC', '406080', 'Christopher Columbus', 'Explorer (1451–1506)',
  "I sailed across the Atlantic Ocean in 1492 looking for India and accidentally reached the Americas — which changed world history forever.",

H('marcopolo', 'MP', '604a20', 'Marco Polo', 'Explorer (1254–1324)',

H('shackleton', 'ES', '405070', 'Ernest Shackleton', 'Antarctic Explorer (1874–1922)',

H('ibnbattuta', 'IB', '704030', 'Ibn Battuta', 'Moroccan Explorer (1304–1369)',

H('zhenghe', 'ZH', '604040', 'Zheng He', 'Chinese Explorer (1371–1433)',

H('amundsen', 'RA', '506080', 'Roald Amundsen', 'Polar Explorer (1872–1928)',

H('magellan', 'FM', '405060', 'Ferdinand Magellan', 'Explorer (1480–1521)',

H('shackletonred', 'SS', '406070', 'Sitting Bull', 'Lakota Chief (1831–1890)',

H('ali', 'MA', '305080', 'Muhammad Ali', 'Boxer (1942–2016)',

H('wilma', 'WR', '805030', 'Wilma Rudolph', 'Sprinter (1940–1994)',

H('simone', 'SB', '406050', 'Simone Biles', 'Gymnast (born 1997)',

  </svg>`;

function darken(hex, pct = 0.2) {
  const h = hex.replace('#','');
  const r = Math.max(0, Math.floor(parseInt(h.substr(0,2), 16) * (1 - pct)));
  const g = Math.max(0, Math.floor(parseInt(h.substr(2,2), 16) * (1 - pct)));
  const b = Math.max(0, Math.floor(parseInt(h.substr(4,2), 16) * (1 - pct)));
  return '#' + r.toString(16).padStart(2, '0') + g.toString(16).padStart(2, '0') + b.toString(16).padStart(2, '0');
}

function caricatureDataUri(featureKey) {
  const f = TRAINER_FEATURES[featureKey] || {};
  return 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(caricatureSVG(f));
}

// Web Speech API — text-to-speech
let _persianVoice = null;
let _voicesLoaded = false;
function loadVoices() {
  if (!('speechSynthesis' in window)) return;
  const voices = window.speechSynthesis.getVoices();
  if (!voices.length) return;
  _voicesLoaded = true;
  // Prefer fa-IR, then any fa-*, then any Persian voice
  _persianVoice = voices.find(v => v.lang === 'fa-IR')
               || voices.find(v => v.lang && v.lang.startsWith('fa'))
               || voices.find(v => v.name && v.name.toLowerCase().includes('persian'));
}
if ('speechSynthesis' in window) {
  loadVoices();
  window.speechSynthesis.onvoiceschanged = loadVoices;
}

function speakFarsi(text, button, phonetic) {
  if (!('speechSynthesis' in window)) {
    flashCloudIndicator('🔇 Speech not supported — try Chrome', '#888');
    return;
  }
  // Mobile Safari / Chrome sometimes need a user-gesture resume
  try { window.speechSynthesis.resume(); } catch {}
  if (!_voicesLoaded) loadVoices();
  // Retry voice lookup if voices came in late
  if (!_persianVoice) loadVoices();
  window.speechSynthesis.cancel();

  const tryUtter = (content, lang, voice) => {
    const u = new SpeechSynthesisUtterance(content);
    u.lang = lang;
    if (voice) u.voice = voice;
    u.rate = 0.85; u.pitch = 1.0; u.volume = 1.0;
    if (button) {
      button.classList.add('speaking');
      u.onend = () => button.classList.remove('speaking');
      u.onerror = () => { button.classList.remove('speaking'); };
    }
    window.speechSynthesis.speak(u);
    return u;
  };

  if (_persianVoice) {
    tryUtter(text, 'fa-IR', _persianVoice);
  } else {
    // No Persian voice installed — speak the phonetic approximation in English
    // This actually sounds better than forcing a non-Persian engine to read Arabic script
    const fallbackText = (phonetic || text).replace(/[-·]/g, ' ');
    tryUtter(fallbackText, 'en-US', null);
    flashCloudIndicator('📢 No Persian voice on device — playing phonetic', '#d08030');
  }
}

// Web Speech API — speech recognition (for "say it back" mode, Chrome/Edge)
const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
function speechRecSupported() { return !!SpeechRec; }

async function listenFarsi(expectedWord) {
  if (!speechRecSupported()) return { supported: false };
  return new Promise((resolve) => {
    const rec = new SpeechRec();
    rec.lang = 'fa-IR';
    rec.continuous = false;
    rec.interimResults = false;
    rec.maxAlternatives = 5;
    let done = false;
    rec.onresult = (e) => {
      done = true;
      const alternatives = [];
      for (let i = 0; i < e.results[0].length; i++) {
        alternatives.push(e.results[0][i].transcript.trim());
      }
      // Check if any alternative matches (loose match)
      const normalized = s => s.replace(/\s+/g,'').toLowerCase();
      const matches = alternatives.some(a => normalized(a) === normalized(expectedWord)
                                          || normalized(a).includes(normalized(expectedWord))
                                          || normalized(expectedWord).includes(normalized(a)));
      resolve({ supported: true, matched: matches, heard: alternatives[0] || '' });
    };
    rec.onerror = () => { if (!done) resolve({ supported: true, matched: false, heard: '', error: true }); };
    rec.onend = () => { if (!done) resolve({ supported: true, matched: false, heard: '' }); };
    try { rec.start(); } catch (e) { resolve({ supported: true, matched: false, error: true }); }
  });
}

function placeBuilding(g, x, y, w, h, roofType) {
  // Top row: roof; middle: walls; bottom row: walls with door
  for (let dy = 0; dy < h; dy++) {
    for (let dx = 0; dx < w; dx++) {
      if (dy === 0) g[y+dy][x+dx] = roofType;
      else if (dy === h-1) g[y+dy][x+dx] = '#';
      else g[y+dy][x+dx] = '#';
    }
  }
  // Put a door in the bottom row (center)
  const doorX = x + Math.floor(w/2);
  g[y + h - 1][doorX] = 'D';
}
function patch(g, x, y, w, h, ch) {
  for (let dy = 0; dy < h; dy++)
    for (let dx = 0; dx < w; dx++)
      if (g[y+dy] && g[y+dy][x+dx] === '.') g[y+dy][x+dx] = ch;
}

const SAVE_KEY = 'pokemon-noah-sinnoh-save-v1';

function buildSavePayload() {
  return {
    v: 2,
    savedAt: Date.now(),
    playerName: state.playerName,
    location: state.location,
    player: state.player,
    party: state.party,
    activeMon: state.activeMon,
    balls: state.balls,
    money: state.money,
    caught: state.caught,
    defeatedTrainers: state.defeatedTrainers || {},
    items: state.items || { potion: 2, superPotion: 0, revive: 0 },
    streak: state.streak || 0,
    bestStreak: state.bestStreak || 0,
    shinyBoostCharges: state.shinyBoostCharges || 0,
    badges: state.badges || {},
    caughtSpecies: state.caughtSpecies || {},
  };
}

function applySavePayload(s) {
  if (!s || !s.party) return false;
  state.playerName = s.playerName || 'Noah';
  state.location   = s.location   || 'Twinleaf Town';
  state.player     = s.player     || { x: 5, y: 4, dir: 'down' };
  state.party      = (s.party || []).map(normalizeMon);
  state.activeMon  = Math.min(s.activeMon || 0, state.party.length - 1);
  state.balls      = s.balls      ?? 10;
  state.money      = s.money      ?? 500;
  state.caught     = s.caught     ?? state.party.length;
  state.defeatedTrainers = s.defeatedTrainers || {};
  state.items      = s.items      || { potion: 2, superPotion: 0, revive: 0 };
  state.streak     = s.streak     || 0;
  state.bestStreak = s.bestStreak || 0;
  state.shinyBoostCharges = s.shinyBoostCharges || 0;
  state.badges     = s.badges     || {};
  state.caughtSpecies = s.caughtSpecies || {};
  // Auto-mark caught for any Pokemon currently in party
  state.party.forEach(m => { state.caughtSpecies[m.id] = true; });
  return true;
}

function saveLocal() {
  try {
    localStorage.setItem(SAVE_KEY, JSON.stringify(buildSavePayload()));
    flashCloudIndicator('💾 Saved', '#808080');
    // Also push to cloud if signed in (debounced)
    if (state.user && window.fb) queueCloudSave();
  } catch (e) { console.warn('Save failed:', e); }
}

function loadLocal() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (!raw) return false;
    return applySavePayload(JSON.parse(raw));
  } catch (e) { console.warn('Load failed:', e); return false; }
}

function hasLocalSave() {
  try { return !!localStorage.getItem(SAVE_KEY); } catch { return false; }
}

function eraseSave() {
  try { localStorage.removeItem(SAVE_KEY); } catch {}
}

let _cloudSaveTimer = null;
function queueCloudSave() {
  if (_cloudSaveTimer) clearTimeout(_cloudSaveTimer);
  _cloudSaveTimer = setTimeout(doCloudSave, 1500);
}

async function doCloudSave() {
  if (!state.user || !window.fb || state.cloudSyncing) return;
  state.cloudSyncing = true;
  try {
    await window.fb.saveDoc(state.user.uid, buildSavePayload());
    flashCloudIndicator('☁️ Synced to cloud', '#30a040');
  } catch (e) {
    console.warn('Cloud save failed:', e);
    flashCloudIndicator('⚠️ Cloud save failed', '#c03030');
  } finally { state.cloudSyncing = false; }
}

async function doCloudLoad() {
  if (!state.user || !window.fb) return false;
  try {
    const data = await window.fb.loadDoc(state.user.uid);
    if (!data) return false;
    applySavePayload(data);
    try { localStorage.setItem(SAVE_KEY, JSON.stringify(data)); } catch {}
    flashCloudIndicator('☁️ Loaded cloud save', '#30a040');
    return true;
  } catch (e) {
    console.warn('Cloud load failed:', e);
    return false;
  }
}

function flashCloudIndicator(text, color = '#30a040') {

// =========================================================================
function randInt(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
const PEOPLE = [
  { name: 'Noah', he: 'he',  him: 'him',  his: 'his' },
  { name: 'Sam',  he: 'she', him: 'her',  his: 'her' },
  { name: 'Ava',  he: 'she', him: 'her',  his: 'her' },
  { name: 'Leo',  he: 'he',  him: 'him',  his: 'his' },
  { name: 'Maya', he: 'she', him: 'her',  his: 'her' },
  { name: 'Ben',  he: 'he',  him: 'him',  his: 'his' },
  { name: 'Zoe',  he: 'she', him: 'her',  his: 'her' },
  { name: 'Kai',  he: 'he',  him: 'him',  his: 'his' },
];
const OBJECTS = ['Pokeballs', 'berries', 'apples', 'stickers', 'marbles', 'coins', 'trading cards'];
const pick = arr => arr[randInt(0, arr.length - 1)];

function generateMathProblem(difficulty) {
  // Returns { q, answer, choices, correctIndex, hint, subject }
  let problem;
  if (difficulty === 'easy') {
    const kinds = ['add1','sub1','add2digit','count'];
    problem = ({
      add1:    () => { const a=randInt(3,19),b=randInt(2,9); return mk(`${a} + ${b}`, a+b, `Start at ${a} and count up ${b} more.`); },
      sub1:    () => { const a=randInt(8,19),b=randInt(2,Math.min(a-1,9)); return mk(`${a} − ${b}`, a-b, `Start at ${a}. Count backwards ${b} times.`); },
      add2digit: () => { const a=randInt(10,50),b=randInt(10,40); return mk(`${a} + ${b}`, a+b, `Add the ones digits first (${a%10}+${b%10}=${(a%10)+(b%10)}), then the tens.`); },
      count:   () => { const s=randInt(2,5), n=randInt(3,5); return mk(`${s} + ${s} + ${s}${n>3?' + '+s:''}${n>4?' + '+s:''}`, s*n, `This is ${s} added ${n} times. That's the same as ${s} × ${n}!`); },
    })[pick(kinds)]();
  }
  else if (difficulty === 'medium') {
    const kinds = ['mult5','sub2digit','add3digit','word1','perimeter'];
    problem = ({
      mult5: () => { const a=randInt(2,5),b=randInt(2,10); return mk(`${a} × ${b}`, a*b, `${a}×${b} means ${a} groups of ${b}. Count: ${Array(a).fill(b).join(' + ')} = ?`); },
      sub2digit: () => { const a=randInt(30,80), b=randInt(10,a-5); return mk(`${a} − ${b}`, a-b, `Subtract the tens (${Math.floor(a/10)*10}-${Math.floor(b/10)*10}) then the ones.`); },
      add3digit: () => { const a=randInt(100,400), b=randInt(50,300); return mk(`${a} + ${b}`, a+b, `Line up the numbers by place value: ones, tens, hundreds.`); },
      word1: () => {
        const p=pick(PEOPLE), o=pick(OBJECTS), a=randInt(4,9), b=randInt(3,8);
        return mk(`${p.name} has ${a} ${o} and gets ${b} more. How many ${o} does ${p.he} have now?`, a+b, `Add the two amounts: ${a} + ${b}.`, true);
      },
      perimeter: () => {
        const s=randInt(3,9);
        return mk(`A square has sides ${s} feet long. What is its perimeter?`, s*4, `Perimeter is the distance around. A square has 4 equal sides. Add: ${s}+${s}+${s}+${s}.`, true);
      },
    })[pick(kinds)]();
  }
  else if (difficulty === 'hard') {
    const kinds = ['mult10','mult12','div','word2','fraction'];
    problem = ({
      mult10: () => { const a=randInt(3,10),b=randInt(3,10); return mk(`${a} × ${b}`, a*b, `Think of the times table! ${a} × ${b}. If stuck, try ${a} × 10 = ${a*10}, then subtract ${a}×${10-b}.`); },
      mult12: () => { const a=randInt(6,12),b=randInt(3,9); return mk(`${a} × ${b}`, a*b, `Break it up: ${a} × ${b} = (${a} × ${Math.floor(b/2)}) + (${a} × ${Math.ceil(b/2)}).`); },
      div: () => { const b=randInt(2,9), q=randInt(3,9); const a=b*q; return mk(`${a} ÷ ${b}`, q, `Ask yourself: what number times ${b} equals ${a}?`); },
      word2: () => {
        const p=pick(PEOPLE), o=pick(OBJECTS), a=randInt(4,9), b=randInt(2,5);
        return mk(`${p.name} has ${a} bags. Each bag holds ${b} ${o}. How many ${o} does ${p.he} have in all?`, a*b, `${a} bags × ${b} per bag. That's multiplication!`, true);
      },
      fraction: () => {
        const whole=randInt(6,12), denom=2+randInt(0,1), choiceWhole=whole*denom;
        return mk(`What is one ${denom === 2 ? 'half' : 'third'} (1/${denom}) of ${choiceWhole}?`, whole, `Split ${choiceWhole} into ${denom} equal groups. Each group is the answer.`, true);
      },
    })[pick(kinds)]();
  } else { // tough
    const kinds = ['mult15','longadd','word3','div2'];
    problem = ({
      mult15: () => { const a=randInt(11,15),b=randInt(3,9); return mk(`${a} × ${b}`, a*b, `Break ${a} into (10 + ${a-10}). Then (10 × ${b}) + (${a-10} × ${b}).`); },
      longadd: () => { const a=randInt(200,800), b=randInt(200,600); return mk(`${a} + ${b}`, a+b, `Add ones, then tens, then hundreds. Don't forget to carry!`); },
      word3: () => {
        const p=pick(PEOPLE), a=randInt(3,6), b=randInt(4,8), given=randInt(2,a-1);
        return mk(`${p.name} caught ${a*b} Pokemon and split them evenly into ${a} groups. Then ${p.he} gave ${given} groups away. How many Pokemon does ${p.he} have left?`, (a-given)*b, `Each group has ${a*b}÷${a}=${b}. ${p.name} kept ${a-given} groups. Multiply (${a}-${given}) × ${b}.`, true);
      },
      div2: () => { const q=randInt(12,30), b=randInt(2,6); return mk(`${q*b} ÷ ${b}`, q, `Think: ${b} × ? = ${q*b}. Try counting by ${b}s.`); },
    })[pick(kinds)]();
  }

  // Build 4 answer choices around the correct one
  const answer = problem.answer;
  const pool = new Set([answer]);
  const spread = Math.max(2, Math.floor(Math.abs(answer) * 0.3));
  let attempts = 0;
  while (pool.size < 4 && attempts++ < 30) {
    const wobble = randInt(-spread, spread) || 1;
    const c = Math.max(0, answer + wobble);
    if (c !== answer) pool.add(c);
  }
  // backup: just add answer+N
  let n = 1;
  while (pool.size < 4) { pool.add(answer + n++); pool.add(Math.max(0, answer - n)); }
  const arr = Array.from(pool).slice(0, 4).sort(() => Math.random() - 0.5);
  return { q: problem.q, answer, choices: arr, correctIndex: arr.indexOf(answer), hint: problem.hint, isWord: problem.isWord };
}

function mk(q, answer, hint, isWord=false) {
  return { q, answer, hint, isWord };
}

function difficultyFor(pokemonId) {
  const base = POKEDEX[pokemonId];
  if (!base) return 'easy';
  if (base.catchRate >= 0.75) return 'easy';
  if (base.catchRate >= 0.45) return 'medium';
  if (base.catchRate >= 0.25) return 'hard';
  return 'tough';
}

function showModal({ title, subtitle, questionHTML, choices, correctIndex, hint, resultOnRight, resultOnWrong, extraTop, allowSkip }) {
  return new Promise((resolve) => {
    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    overlay.innerHTML = `
      <div class="modal">
        <h3>${title}</h3>
        <div class="subtitle">${subtitle || ''}</div>
        ${extraTop || ''}
        <div class="math-question">${questionHTML}</div>
        <div class="choices">
          ${choices.map((c, i) => `<button class="choice-btn" data-i="${i}">${c}</button>`).join('')}
        </div>
        <div style="display:grid;grid-template-columns:${hint ? '1fr 1fr' : '1fr'};gap:6px;margin-top:8px;">
          ${hint ? `<button class="btn" id="hintBtn" style="font-size:9px;">💡 HINT</button>` : ''}
          ${allowSkip ? `<button class="btn" id="skipBtn" style="font-size:9px;background:#d8d8d8;">⏭ SKIP (no boost)</button>` : ''}
        </div>
        <div class="modal-result" id="hintBox" style="display:none;background:#fff8e0;color:#604020;border:2px dashed #f0a030;"></div>
        <div class="modal-result" id="mResult"></div>
      </div>
    `;
    screen.appendChild(overlay);
    const result = overlay.querySelector('#mResult');
    const btns = overlay.querySelectorAll('.choice-btn');
    let usedHint = false;
    if (hint) {
      overlay.querySelector('#hintBtn').onclick = () => {
        usedHint = true;
        const box = overlay.querySelector('#hintBox');
        box.style.display = 'block';
        box.textContent = '💡 HINT: ' + hint;
        overlay.querySelector('#hintBtn').style.display = 'none';
      };
    }
    if (allowSkip) {
      overlay.querySelector('#skipBtn').onclick = () => {
        overlay.remove();
        resolve({ correct: false, usedHint: false, skipped: true });
      };
    }
    btns.forEach(btn => {
      btn.onclick = () => {
        const i = parseInt(btn.dataset.i);
        const correct = i === correctIndex;
        btns.forEach((b, idx) => {
          b.disabled = true;
          if (idx === correctIndex) b.classList.add('correct');
          else if (idx === i && !correct) b.classList.add('wrong');
        });
        result.classList.add(correct ? 'good' : 'bad');
        let txt = correct
          ? (resultOnRight || '✓ Amazing! Correct!') + (usedHint ? ' (used a hint — still great!)' : '')
          : (resultOnWrong || `Nice try! The correct answer is highlighted in green.`);
        result.textContent = txt;
        setTimeout(() => { overlay.remove(); resolve({ correct, usedHint, skipped: false }); }, correct ? 1500 : 2600);
      };
    });
  });
}

function fractionApprox(p) {
  // Return a simple fraction approx of probability p (e.g. 0.45 -> "about 9/20 or 45%")
  const denominators = [2, 3, 4, 5, 10, 20];
  let best = { d: 10, n: Math.round(p * 10), err: Infinity };
  denominators.forEach(d => {
    const n = Math.round(p * d);
    const err = Math.abs(p - n/d);
    if (err < best.err) best = { d, n, err };
  });
  return `${best.n}/${best.d}`;
}

async function askMathBoost(purpose, pokemonId) {
  const diff = difficultyFor(pokemonId);
  const prob = generateMathProblem(diff);
  const diffLabel = { easy: 'Warm-Up', medium: 'Tricky', hard: 'Tough', tough: 'Champion' }[diff];

  // For CATCH, also show the probability mini-lesson
  let extraTop = '';
  if (purpose === 'catch' && state.battle?.wild) {
    const wild = state.battle.wild;
    const hpRatio = wild.hp / wild.maxHp;
    const baseChance = Math.min(0.97, wild.catchRate * (1.8 - hpRatio));
    const pct = Math.round(baseChance * 100);
    extraTop = `
      <div style="background:#e8f4ff;border:2px solid #6890d0;border-radius:8px;padding:8px;margin-bottom:12px;font-size:8px;line-height:1.6;color:#203050;">
        <b>📊 ODDS LESSON:</b> Your chance to catch this ${wild.name.toUpperCase()} right now is <b>${pct}%</b>
        (about <b>${fractionApprox(baseChance)}</b>). The Pokemon's HP is lower, so the chance goes <b>up</b>! Solve the math to <b>boost</b> it even more.
      </div>`;
  }

  const res = await showModal({
    title: purpose === 'catch' ? '🧠 SOLVE TO BOOST YOUR CATCH' : '🧠 SOLVE TO POWER UP YOUR ATTACK',
    subtitle: `${diffLabel} problem! Tap 💡 NEED A HINT? if stuck, or ⏭ SKIP to just go. ${state.streak > 0 ? `🔥 ${state.streak} streak!` : ''}`,
    extraTop,
    questionHTML: prob.isWord ? prob.q : `What is <b>${prob.q}</b> = ?`,
    choices: prob.choices,
    correctIndex: prob.correctIndex,
    hint: prob.hint,
    allowSkip: true,
    resultOnRight: purpose === 'catch'
      ? '✓ Correct! Your POKEBALL gets a BIG boost!'
      : '✓ Correct! Your attack will hit MUCH harder!',
    resultOnWrong: `Nice try! Answer was ${prob.answer}. You still get a small boost — keep practicing!`,
  });
  if (res.skipped) return false; // skipped = no boost, no streak change
  registerStreakResult(res.correct);
  return res.correct;
}

async function askTriviaBoost(trainer) {
  const q = trainer.quiz;
  const indexed = q.choices.map((c, i) => ({ c, correct: i === q.answer }));
  indexed.sort(() => Math.random() - 0.5);
  const correctIndex = indexed.findIndex(x => x.correct);
  const res = await showModal({
    title: '📚 HISTORY QUIZ TIME',
    subtitle: `Based on what ${trainer.name} just told you!`,
    questionHTML: q.q,
    choices: indexed.map(x => x.c),
    correctIndex,
    resultOnRight: '✓ Yes! You\'ve been paying attention! Battle advantage earned!',
    resultOnWrong: `The answer was "${q.choices[q.answer]}". You'll still battle — just a little tougher!`,
  });
  return res.correct;
}

function registerStreakResult(correct) {
  if (!state.streak) state.streak = 0;
  if (!state.bestStreak) state.bestStreak = 0;
  if (correct) {
    state.streak++;
    if (state.streak > state.bestStreak) state.bestStreak = state.streak;
    handleStreakReward(state.streak);
  } else {
    if (state.streak >= 3) flashCloudIndicator(`🔥 Streak ended at ${state.streak}!`, '#d06020');
    state.streak = 0;
  }
  updateStreakBadge();
  saveLocal();
}

function handleStreakReward(n) {
  const rewards = {

const GENDERLESS_IDS = new Set([129, 132, 436, 437, 425, 426, 433]); // Magikarp/Ditto/Bronzor etc. — keep simple
const NATURES = [
  { name: 'Hardy', desc: 'Balanced' }, { name: 'Brave', desc: 'Loves to fight' },
  { name: 'Timid', desc: 'A little shy' }, { name: 'Jolly', desc: 'Super cheerful' },
  { name: 'Calm', desc: 'Stays cool' }, { name: 'Bold', desc: 'Not afraid' },
  { name: 'Gentle', desc: 'Very kind' }, { name: 'Quirky', desc: 'A bit odd' },
];

function makeMon(id, level = 5, catchInfo = null) {
  const base = POKEDEX[id];
  const maxHp = Math.floor(base.hp * (1 + level * 0.1));
  const shinyRate = (state.shinyBoostCharges || 0) > 0 ? 0.002 : 0.0001; // 20x boost during streak reward
  if (state.shinyBoostCharges > 0) state.shinyBoostCharges--;
  const isShiny = Math.random() < shinyRate;
  const gender = GENDERLESS_IDS.has(id) ? 'none' : (Math.random() < 0.5 ? 'male' : 'female');
  const nature = NATURES[Math.floor(Math.random() * NATURES.length)];
  return {
    id, level, name: base.name, types: base.types,
    maxHp, hp: maxHp,
    atk: Math.floor(base.atk * (1 + level * 0.08)),
    def: Math.floor(base.def * (1 + level * 0.08)),
    moves: [...base.moves], catchRate: base.catchRate, xp: 0,
    gender, shiny: isShiny, nature: nature.name, natureDesc: nature.desc,
    caughtLocation: catchInfo?.location || 'Trainer gift',
    caughtDate: catchInfo?.date || new Date().toLocaleDateString(),
    caughtLevel: level,
    nickname: null,
  };
}
const randLv = () => 3 + Math.floor(Math.random() * 6);

// Backward-compatibility patcher — add missing fields to legacy saves
function normalizeMon(m) {
  if (m.shiny === undefined) m.shiny = false;
  if (!m.gender) m.gender = GENDERLESS_IDS.has(m.id) ? 'none' : (Math.random() < 0.5 ? 'male' : 'female');
  if (!m.nature) { const n = NATURES[Math.floor(Math.random() * NATURES.length)]; m.nature = n.name; m.natureDesc = n.desc; }
  if (!m.caughtLocation) m.caughtLocation = 'Unknown';
  if (!m.caughtDate) m.caughtDate = 'Long ago';
  if (!m.caughtLevel) m.caughtLevel = Math.max(1, m.level - 2);
  return m;
}

function renderLogin(mode = 'signin') {
  state.screen = 'login';
  const isSignup = mode === 'signup';
  screen.innerHTML = `
    <div class="login-screen fade-in">
      <h2>${isSignup ? '🆕 CREATE ACCOUNT' : '🔐 SIGN IN'}</h2>
      <div class="login-card">
        <label>EMAIL</label>
        <input type="email" id="loginEmail" placeholder="you@example.com" autocomplete="email">
        <label>PASSWORD</label>
        <input type="password" id="loginPassword" placeholder="at least 6 characters" autocomplete="${isSignup ? 'new-password' : 'current-password'}">
        <div class="login-msg" id="loginMsg"></div>
      </div>
      <div class="account-status">Your saved game syncs to any device you sign in on.</div>
    </div>
  `;
  setMsgInstant(isSignup
    ? "Create an account to save your Pokemon to the cloud!"
    : "Sign in to load your cloud save.");
  setActions([
    { label: isSignup ? '🆕 CREATE' : '🔐 SIGN IN', primary: true, onClick: () => doAuth(isSignup) },
    { label: isSignup ? 'I HAVE AN ACCOUNT' : 'CREATE ACCOUNT', onClick: () => renderLogin(isSignup ? 'signin' : 'signup') },
    { label: '⬅ BACK', back: true, onClick: renderTitle },
  ]);
  setTimeout(() => document.getElementById('loginEmail')?.focus(), 50);
  document.addEventListener('keydown', loginKeyHandler);
}

function loginKeyHandler(e) {
  if (state.screen !== 'login') { document.removeEventListener('keydown', loginKeyHandler); return; }
  if (e.key === 'Enter') {
    e.preventDefault();
    // figure out mode from current title
    const isSignup = document.querySelector('.login-screen h2')?.textContent?.includes('CREATE');
    doAuth(isSignup);
  }
}

async function doAuth(isSignup) {
  const email = document.getElementById('loginEmail').value.trim();
  const pass  = document.getElementById('loginPassword').value;
  const msg   = document.getElementById('loginMsg');
  msg.classList.remove('success');
  if (!email || !pass) { msg.textContent = 'Please enter both fields.'; return; }
  if (pass.length < 6) { msg.textContent = 'Password must be at least 6 characters.'; return; }
  if (!window.fb) { msg.textContent = 'Firebase not configured. See FIREBASE-SETUP.md.'; return; }

  msg.textContent = isSignup ? 'Creating account...' : 'Signing in...';
  try {
    const cred = isSignup ? await window.fb.createUser(email, pass)
                          : await window.fb.signIn(email, pass);
    state.user = { uid: cred.user.uid, email: cred.user.email };
    updateAccountBadge();
    msg.classList.add('success');
    msg.textContent = isSignup ? '✓ Account created! Loading...' : '✓ Signed in! Loading cloud save...';

    // Merge strategy: if cloud has a save and local has one, prefer cloud.
    // If new signup, push local save up (so existing progress doesn't get lost).
    if (isSignup) {
      if (hasLocalSave()) await doCloudSave();
    } else {
      const loaded = await doCloudLoad();
      if (!loaded && hasLocalSave()) {
        // Signed in but no cloud save yet — push local up so future sessions get it
        await doCloudSave();
      }
    }
    setTimeout(renderTitle, 600);
  } catch (e) {
    const codeMap = {
      'auth/email-already-in-use': 'That email already has an account. Try signing in.',
      'auth/invalid-email': 'That email address is not valid.',
      'auth/weak-password': 'Password is too weak (needs 6+ characters).',
      'auth/wrong-password': 'Wrong password.',
      'auth/user-not-found': 'No account with that email. Try creating one.',
      'auth/invalid-credential': 'Wrong email or password.',
      'auth/too-many-requests': 'Too many attempts. Wait a bit and try again.',
    };
    msg.textContent = codeMap[e.code] || ('Error: ' + (e.message || e.code));
  }
}

async function handleSignOut() {
  if (!window.fb) return;
  try { await window.fb.signOut(); } catch {}
  state.user = null;
  updateAccountBadge();
  renderTitle();
}

  if (x >= 40 && x < 60 && y < 16) return 'Eterna Forest';
  if (x >= 62 && x < 85 && y < 15) return 'Valley Windworks';
  if (x >= 85 && x < 108 && y < 20) return 'Fuego Ironworks';
  if (x >= 108 && x < 135 && y < 22) return 'Mt. Coronet North';
  if (x >= 135 && x < 165 && y < 24) return 'Snowpoint City';

  // Middle-north (y 16-42)
  if (x >= 42 && x < 56 && y >= 16 && y < 23) return 'Floaroma Town';
  if (x < 10 && y >= 14 && y < 24) return 'Lake Verity';
  if (x >= 9 && x < 22 && y >= 16 && y < 26) return 'Sandgem Town';
  if (x >= 25 && x < 40 && y >= 16 && y < 30) return 'Jubilife City';
  if (x >= 40 && x < 62 && y >= 24 && y < 42) return 'Hearthome City';

  // Middle (y 40-70)
  if (x < 30 && y >= 42 && y < 62) return 'Canalave City';
  if (x >= 62 && x < 98 && y >= 42 && y < 62) return 'Eterna City';
  if (x >= 98 && x < 138 && y >= 40 && y < 62) return 'Route 211';
  if (x >= 138 && x < 160 && y >= 40 && y < 70) return 'Mt. Coronet Pass';
  if (x >= 160 && y >= 42 && y < 62) return 'Celestic Town';

  // Middle-south (y 60-90)
  if (x >= 62 && x < 95 && y >= 70 && y < 90) return 'Route 212 (Rainy)';

  // Southern tier (y 75-100)
  if (x < 35 && y >= 33 && y < 40) return 'Pastoria Beach';
  if (x < 35 && y >= 75 && y < 95) return 'Pastoria City';
  if (x >= 35 && x < 62 && y >= 75 && y < 100) return 'Great Marsh';
  if (x >= 98 && x < 135 && y >= 80 && y < 100) return 'Route 213 (Beach)';
  if (x >= 135 && x < 168 && y >= 75 && y < 98) return 'Veilstone City';
  if (x >= 168 && y >= 75 && y < 95) return 'Solaceon Town';

  // Far south (y 100-150)
  if (x >= 25 && x < 60 && y >= 103 && y < 125) return 'Sunyshore City';
  if (x >= 65 && x < 105 && y >= 110 && y < 130) return 'Route 222 (Beach)';
  if (x >= 110 && x < 145 && y >= 105 && y < 130) return 'Pokemon League';
  if (x >= 148 && x < 185 && y >= 105 && y < 140) return 'Victory Road';

  if (y >= 30 && x < 26) return 'Route 205';
  if (y >= 30 && x >= 26 && x < 40) return 'Mt. Coronet Pass';
  if (y >= 25) return 'Route 203';
  if (x >= 35 && y >= 27) return 'Oreburgh Gate';
  return 'Route 201';
}
