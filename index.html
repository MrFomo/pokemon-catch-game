<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pokemon Catch Game — Sinnoh Adventure</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<!-- =====  FIREBASE (cloud save + accounts)  =====
     Replace the placeholder values below with your own Firebase project's config.
     Step-by-step setup is in FIREBASE-SETUP.md (also saved in this folder).
     Until you replace these, the game still works and saves locally in the browser.
-->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import {
    getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword,
    signOut, onAuthStateChanged
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import {
    getFirestore, doc, setDoc, getDoc
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  // === REPLACE THIS BLOCK with the config from your Firebase console ===
  const firebaseConfig = {
    apiKey: "REPLACE_ME",
    authDomain: "REPLACE_ME.firebaseapp.com",
    projectId: "REPLACE_ME",
    storageBucket: "REPLACE_ME.appspot.com",
    messagingSenderId: "REPLACE_ME",
    appId: "REPLACE_ME"
  };
  // =====================================================================

  const firebaseEnabled = !firebaseConfig.apiKey.includes('REPLACE_ME');
  window.firebaseEnabled = firebaseEnabled;

  if (firebaseEnabled) {
    try {
      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);
      const db = getFirestore(app);
      window.fb = {
        auth, db,
        createUser: (e,p) => createUserWithEmailAndPassword(auth, e, p),
        signIn:     (e,p) => signInWithEmailAndPassword(auth, e, p),
        signOut:    () => signOut(auth),
        onAuth:     (cb) => onAuthStateChanged(auth, cb),
        saveDoc:    (uid, data) => setDoc(doc(db, "saves", uid), data),
        loadDoc:    async (uid) => (await getDoc(doc(db, "saves", uid))).data(),
      };
      window.dispatchEvent(new Event('firebase-ready'));
    } catch (e) {
      console.warn('Firebase init failed:', e);
      window.firebaseEnabled = false;
    }
  }
</script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --fr-red: #e03028;
    --fr-red-dk: #a82020;
    --fr-cream: #f8e0b0;
    --fr-brown: #684028;
    --fr-dark-brown: #402818;
    --fr-tan: #e8c078;
    --fr-blue: #2868a8;
    --fr-dark: #202830;
    --fr-light: #f8f8f8;
  }
  body {
    font-family: 'Press Start 2P', 'Courier New', monospace;
    background: #0c0c14;
    background-image:
      radial-gradient(circle at 20% 20%, rgba(224,48,40,0.12) 0, transparent 50%),
      radial-gradient(circle at 80% 80%, rgba(40,104,168,0.12) 0, transparent 50%);
    color: var(--fr-dark);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
    user-select: none;
  }
  img { image-rendering: pixelated; image-rendering: crisp-edges; }

  #game {
    width: 768px;
    max-width: 100%;
    background: var(--fr-red);
    border: 4px solid #401010;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 16px 50px rgba(0,0,0,0.7), inset 0 0 0 2px rgba(255,255,255,0.1);
  }
  #header {
    background: linear-gradient(180deg, var(--fr-red) 0%, var(--fr-red-dk) 100%);
    padding: 10px 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    color: #fff;
    font-size: 9px;
    border-bottom: 3px solid #401010;
    text-shadow: 1px 1px 0 #000;
  }
  #title { font-size: 10px; letter-spacing: 1px; }
  #stats { font-size: 8px; letter-spacing: 1px; }

  #screen {
    position: relative;
    width: 100%;
    height: 480px;
    background: #000;
    overflow: hidden;
    border-top: 2px solid #401010;
    border-bottom: 2px solid #401010;
  }

  /* Title Screen */
  .title-screen {
    position: absolute; inset: 0;
    background:
      linear-gradient(180deg, #f87858 0%, #e03028 50%, #a81818 100%);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center; color: #fff; padding: 20px;
  }
  .title-screen h1 {
    font-size: 26px;
    text-shadow: 3px 3px 0 #401010, 6px 6px 0 rgba(0,0,0,0.4);
    margin-bottom: 6px;
    letter-spacing: 2px; line-height: 1.3;
  }
  .title-screen h2 {
    font-size: 12px; color: #ffd030;
    text-shadow: 2px 2px 0 #401010; margin-bottom: 18px;
  }
  .title-screen .big-sprite {
    width: 150px; height: 150px;
    background: rgba(255,255,255,0.22);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    margin: 10px 0;
    box-shadow: 0 0 40px rgba(255,255,255,0.5);
    animation: bob 2s ease-in-out infinite;
  }
  @keyframes bob { 50% { transform: translateY(-10px); } }
  .title-screen .big-sprite img { width: 130px; height: 130px; }
  .press-start {
    margin-top: 16px; font-size: 10px;
    animation: blink 1s infinite;
  }
  @keyframes blink { 50% { opacity: 0.3; } }

  /* Intro */
  .intro {
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at center, #2a2a3a 0%, #0c0c14 100%);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 24px; text-align: center; color: #fff;
  }
  .intro .prof-sprite {
    width: 140px; height: 140px;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 14px;
    font-size: 90px;
    filter: drop-shadow(0 0 20px rgba(255,216,48,0.5));
  }
  .intro h2 { font-size: 13px; margin-bottom: 12px; color: #ffd030; text-shadow: 2px 2px 0 #401010; }
  .intro p { font-size: 9px; line-height: 1.9; max-width: 600px; min-height: 60px; }

  /* Starter choice */
  .starters {
    position: absolute; inset: 0;
    background: linear-gradient(180deg, #2a3a20 0%, #1a2a18 100%);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 16px;
  }
  .starters h2 {
    color: #ffd030; font-size: 11px; margin-bottom: 14px;
    text-shadow: 2px 2px 0 #000;
  }
  .starter-row { display: flex; gap: 16px; }
  .starter {
    width: 160px;
    background: var(--fr-cream);
    border: 3px solid var(--fr-brown);
    border-radius: 8px;
    padding: 12px;
    cursor: pointer;
    text-align: center;
    transition: transform 0.15s;
    color: var(--fr-dark);
  }
  .starter:hover { transform: translateY(-8px); border-color: var(--fr-red); box-shadow: 0 8px 0 rgba(0,0,0,0.3); }
  .starter img { width: 90px; height: 90px; }
  .starter .nm { font-size: 10px; margin-top: 4px; }
  .starter .tp { font-size: 8px; margin-top: 4px; }
  .starter .desc { font-size: 7px; margin-top: 6px; line-height: 1.5; color: #604020; }

  /* OVERWORLD — big scrolling map */
  #viewport {
    position: absolute; inset: 0;
    overflow: hidden;
    background: #111;
  }
  #world {
    position: absolute;
    top: 0; left: 0;
    display: grid;
    grid-auto-flow: row;
    transition: transform 0.14s linear;
  }
  .tile {
    position: relative;
    width: 48px; height: 48px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
  }
  .tile.grass { background: #58a048; background-image: repeating-linear-gradient(45deg, #58a048 0 5px, #68b050 5px 10px); }
  .tile.tall-grass { background: #1e5028; background-image: repeating-linear-gradient(45deg, #1e5028 0 4px, #2d6838 4px 8px); color: #0f2a14; }
  .tile.path { background: #d8b878; background-image: repeating-linear-gradient(90deg, #d8b878 0 8px, #c8a868 8px 12px); }
  .tile.water { background: #4080c8; background-image: linear-gradient(180deg, #5090d8 0%, #3070b8 100%); }
  .tile.water::after { content: '〰'; color: rgba(255,255,255,0.4); font-size: 12px; }
  .tile.tree {
    background: #184818;
    background-image: radial-gradient(circle at 50% 40%, #286030 0 60%, transparent 60%),
                      radial-gradient(circle at 50% 50%, #1a3818 0 70%, transparent 70%);
  }
  .tile.tree::after { content: ''; }
  .tile.rock { background: #888888; background-image: radial-gradient(circle at 40% 40%, #aaa 0 40%, #666 60%, #444 100%); }
  .tile.flower { background: #58a048; }
  .tile.flower::after { content: '🌸'; font-size: 14px; }
  .tile.sand { background: #e8d098; background-image: repeating-linear-gradient(90deg, #e8d098 0 6px, #dcc488 6px 10px); }
  .tile.building-roof {
    background: linear-gradient(180deg, #c04040 0%, #802020 100%);
    border: 2px solid #401010;
  }
  .tile.building-wall {
    background: #d8c090;
    border: 2px solid #604020;
    color: #402818; font-size: 10px;
  }
  .tile.door {
    background: #401810;
    border: 2px solid #604020;
  }
  .tile.door::after { content: ''; position: absolute; width: 4px; height: 4px; background: #ffd030; right: 20%; top: 50%; border-radius: 50%; }
  .tile.sign {
    background: #58a048;
  }
  .tile.sign::after { content: '📜'; font-size: 18px; }
  .tile.ledge {
    background: #58a048;
    border-bottom: 4px solid #2a5a20;
  }
  .tile.cave {
    background: #2a2a3a;
    background-image: radial-gradient(circle at 50% 50%, #1a1a2a 0 50%, #000 100%);
    color: #aaa; font-size: 10px;
  }
  .tile.pokecenter-roof { background: linear-gradient(180deg, #e04040 0%, #a02020 100%); border: 2px solid #401010; }
  .tile.pokecenter-roof::after { content: 'P'; color: #fff; font-weight: bold; font-size: 16px; text-shadow: 1px 1px 0 #000; }
  .tile.pokemart-roof { background: linear-gradient(180deg, #4080c8 0%, #2060a0 100%); border: 2px solid #102040; }
  .tile.pokemart-roof::after { content: '🛒'; font-size: 16px; }
  .tile.lab-roof { background: linear-gradient(180deg, #6090c0 0%, #406080 100%); border: 2px solid #102030; }
  .tile.lab-roof::after { content: '🔬'; font-size: 14px; }
  .tile.fence {
    background: #58a048;
    background-image: linear-gradient(90deg, transparent 40%, #8b6838 40% 60%, transparent 60%),
                      linear-gradient(180deg, transparent 20%, #8b6838 20% 30%, transparent 30%, transparent 60%, #8b6838 60% 70%, transparent 70%);
  }
  .tile.npc { background: #d8b878; }

  /* NPCs and player on world layer */
  .entity {
    position: absolute;
    width: 48px; height: 48px;
    display: flex; align-items: center; justify-content: center;
    font-size: 32px;
    pointer-events: none;
    z-index: 10;
    filter: drop-shadow(2px 3px 2px rgba(0,0,0,0.6));
    transition: left 0.14s linear, top 0.14s linear;
  }
  .entity.npc { z-index: 5; animation: bob-slow 3s ease-in-out infinite; }
  @keyframes bob-slow { 50% { transform: translateY(-3px); } }

  .location-toast {
    position: absolute;
    top: 16px; left: 50%;
    transform: translateX(-50%);
    background: var(--fr-cream);
    border: 3px solid var(--fr-brown);
    padding: 8px 16px;
    font-size: 9px;
    color: var(--fr-dark);
    z-index: 50;
    border-radius: 6px;
    box-shadow: 0 4px 8px rgba(0,0,0,0.4);
    animation: toastShow 3s forwards;
  }
  @keyframes toastShow {
    0% { opacity: 0; transform: translate(-50%, -20px); }
    15%, 70% { opacity: 1; transform: translate(-50%, 0); }
    100% { opacity: 0; transform: translate(-50%, -20px); }
  }

  .minimap-label {
    position: absolute;
    top: 10px; right: 10px;
    background: rgba(0,0,0,0.7);
    color: #fff;
    font-size: 8px;
    padding: 5px 8px;
    z-index: 40;
    border-radius: 4px;
    border: 1px solid #555;
  }

  /* BATTLE */
  .battle {
    position: absolute; inset: 0;
    background:
      linear-gradient(180deg, #98d8f8 0%, #98d8f8 45%, #58a848 45%, #48983c 100%);
    overflow: hidden;
  }
  .battle-scene-transition {
    position: absolute; inset: 0;
    background: #000;
    z-index: 100;
    animation: sceneFade 0.8s forwards;
    pointer-events: none;
  }
  @keyframes sceneFade {
    0% { opacity: 1; clip-path: circle(0% at 50% 50%); }
    100% { opacity: 0; clip-path: circle(100% at 50% 50%); }
  }
  .enemy-platform, .player-platform {
    position: absolute;
    width: 220px; height: 46px;
    border-radius: 50%;
    background: radial-gradient(ellipse at center, rgba(88,48,24,0.5) 0%, transparent 70%);
  }
  .enemy-platform { top: 130px; right: 40px; }
  .player-platform { bottom: 50px; left: 40px; }

  .enemy-area, .player-area { position: absolute; }
  .enemy-area { top: 50px; right: 80px; }
  .player-area { bottom: 80px; left: 50px; }

  .mon-sprite {
    width: 150px; height: 150px;
    filter: drop-shadow(3px 5px 3px rgba(0,0,0,0.4));
    transition: transform 0.2s, opacity 0.3s;
  }
  .mon-sprite.small { width: 120px; height: 120px; }
  .mon-sprite.appear { animation: appear 0.6s; }
  .mon-sprite.shake { animation: shake 0.4s; }
  .mon-sprite.hit { animation: hit 0.6s; }
  .mon-sprite.faint { animation: faint 0.9s forwards; }
  .mon-sprite.attack-forward { animation: attackFwd 0.4s; }
  .mon-sprite.attack-back { animation: attackBack 0.4s; }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20% { transform: translateX(-12px); }
    40% { transform: translateX(12px); }
    60% { transform: translateX(-10px); }
    80% { transform: translateX(10px); }
  }
  @keyframes hit {
    0%,100% { opacity: 1; }
    20% { opacity: 0.1; filter: drop-shadow(0 0 10px red) brightness(2); }
    40% { opacity: 1; }
    60% { opacity: 0.1; filter: drop-shadow(0 0 10px red) brightness(2); }
    80% { opacity: 1; }
  }
  @keyframes faint {
    to { transform: translateY(90px) scale(0.4); opacity: 0; }
  }
  @keyframes appear {
    from { transform: scale(0.3); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }
  @keyframes attackFwd {
    0%,100% { transform: translateX(0); }
    50% { transform: translateX(60px) scale(1.08); }
  }
  @keyframes attackBack {
    0%,100% { transform: translateX(0); }
    50% { transform: translateX(-60px) scale(1.08); }
  }

  .mon-info {
    position: absolute;
    background: var(--fr-cream);
    border: 3px solid var(--fr-brown);
    border-radius: 6px;
    padding: 7px 12px;
    min-width: 220px;
    color: var(--fr-dark);
    font-size: 9px;
    box-shadow: 2px 3px 0 #401818;
  }
  .enemy-info { top: 30px; left: 30px; }
  .player-info { bottom: 30px; right: 30px; }
  .mon-info .nm { display: flex; justify-content: space-between; margin-bottom: 4px; font-size: 10px; }
  .hpbar-label { font-size: 7px; color: #d03030; margin-right: 4px; display: inline-block; vertical-align: middle; }
  .hpbar {
    display: inline-block; vertical-align: middle;
    width: calc(100% - 30px);
    background: #400; height: 10px;
    border-radius: 2px; overflow: hidden;
    border: 1px solid #200;
  }
  .hpbar-fill { height: 100%; background: #30c030; transition: width 0.6s ease-out, background 0.3s; }
  .hp-text { font-size: 8px; margin-top: 3px; text-align: right; }
  .xpbar { width: 100%; background: #222; height: 3px; border-radius: 1px; margin-top: 3px; overflow: hidden; }
  .xpbar-fill { height: 100%; background: #40a8f0; transition: width 0.5s; }

  /* Attack animations */
  .move-fx {
    position: absolute;
    pointer-events: none;
    z-index: 15;
    font-size: 32px;
  }
  .move-particle {
    position: absolute;
    font-size: 24px;
    pointer-events: none;
  }
  .fx-impact {
    position: absolute;
    font-size: 48px;
    pointer-events: none;
    z-index: 16;
    animation: impactPulse 0.5s forwards;
  }
  @keyframes impactPulse {
    0% { transform: scale(0) rotate(0); opacity: 1; }
    50% { transform: scale(1.5) rotate(180deg); opacity: 1; }
    100% { transform: scale(2) rotate(360deg); opacity: 0; }
  }
  @keyframes projectileToEnemy {
    0% { left: 180px; top: 280px; opacity: 0; transform: scale(0.5); }
    20% { opacity: 1; }
    100% { left: 560px; top: 130px; opacity: 1; transform: scale(1.2); }
  }
  @keyframes projectileToPlayer {
    0% { left: 560px; top: 130px; opacity: 0; transform: scale(0.5); }
    20% { opacity: 1; }
    100% { left: 180px; top: 280px; opacity: 1; transform: scale(1.2); }
  }
  .fx-slash {
    position: absolute;
    width: 180px; height: 180px;
    pointer-events: none;
    z-index: 16;
    background: linear-gradient(45deg, transparent 40%, #fff 48%, #fff 52%, transparent 60%);
    animation: slashAnim 0.4s forwards;
  }
  @keyframes slashAnim {
    0% { transform: scale(0.5) rotate(-45deg); opacity: 0; }
    50% { opacity: 1; }
    100% { transform: scale(1.5) rotate(45deg); opacity: 0; }
  }
  .fx-flash {
    position: absolute; inset: 0;
    background: #fff;
    z-index: 14;
    pointer-events: none;
    animation: flashAttack 0.3s forwards;
  }
  @keyframes flashAttack {
    0%,100% { opacity: 0; }
    50% { opacity: 0.7; }
  }
  .fx-shake-screen { animation: screenShake 0.5s; }
  @keyframes screenShake {
    0%,100% { transform: translate(0,0); }
    20% { transform: translate(-4px, 3px); }
    40% { transform: translate(4px, -3px); }
    60% { transform: translate(-3px, -3px); }
    80% { transform: translate(3px, 3px); }
  }

  /* Pokeball */
  .pokeball-anim {
    position: absolute;
    width: 40px; height: 40px;
    z-index: 20;
    background:
      linear-gradient(180deg, #e03030 0 48%, #222 48% 52%, #fff 52% 100%);
    border-radius: 50%;
    border: 3px solid #222;
    box-shadow: inset 0 -4px 0 rgba(0,0,0,0.3), 0 3px 5px rgba(0,0,0,0.5);
  }
  .pokeball-anim::after {
    content: '';
    position: absolute;
    top: 40%; left: 40%;
    width: 20%; height: 20%;
    background: #fff;
    border: 2px solid #222;
    border-radius: 50%;
  }
  .pokeball-anim.throw { animation: throwball 0.9s forwards; }
  .pokeball-anim.wiggle { animation: wiggle 0.6s infinite; }
  @keyframes throwball {
    0% { left: 70px; top: 340px; transform: rotate(0deg) scale(0.7); }
    40% { left: 340px; top: 100px; transform: rotate(360deg) scale(1); }
    70% { left: 520px; top: 110px; transform: rotate(720deg) scale(1); }
    100% { left: 520px; top: 160px; transform: rotate(720deg) scale(1); }
  }
  @keyframes wiggle {
    0%,100% { transform: rotate(-20deg); }
    50% { transform: rotate(20deg); }
  }

  /* Dialog box - Fire Red style */
  #ui {
    background: #f8f8f8;
    padding: 10px;
    min-height: 130px;
    border-top: 4px solid #401010;
    background-image: linear-gradient(180deg, #fff 0%, #e8e8e8 100%);
  }
  #message {
    background: #fff;
    padding: 12px 14px;
    border: 4px solid var(--fr-brown);
    border-radius: 8px;
    min-height: 60px;
    font-size: 10px;
    line-height: 1.8;
    color: var(--fr-dark);
    position: relative;
    box-shadow: inset 0 0 0 2px #fff, 2px 3px 0 #401818;
  }
  #message::after {
    content: '▼';
    position: absolute;
    right: 12px; bottom: 6px;
    color: var(--fr-red);
    font-size: 10px;
    animation: arrow 0.7s infinite;
  }
  #message.no-arrow::after { display: none; }
  @keyframes arrow { 50% { opacity: 0; } }

  #actions {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 6px;
    margin-top: 8px;
  }
  .btn {
    background: #fff;
    border: 3px solid var(--fr-brown);
    color: var(--fr-dark);
    padding: 10px 6px;
    font-family: inherit;
    font-size: 9px;
    cursor: pointer;
    border-radius: 6px;
    transition: all 0.1s;
    text-transform: uppercase;
    letter-spacing: 1px;
    box-shadow: 2px 2px 0 #401818;
  }
  .btn:hover:not(:disabled) {
    background: var(--fr-red); color: #fff; border-color: #401010;
    transform: translate(1px, 1px);
    box-shadow: 1px 1px 0 #401818;
  }
  .btn:active:not(:disabled) { transform: translate(2px, 2px); box-shadow: none; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn.back { grid-column: span 2; background: #d8d8d8; }
  .btn.primary { background: var(--fr-red); color: #fff; border-color: #401010; }

  /* Party */
  .party-screen {
    position: absolute; inset: 0;
    background: linear-gradient(180deg, #4080c8 0%, #2060a0 100%);
    padding: 14px;
    overflow-y: auto;
  }
  .party-screen h2 {
    color: #fff; font-size: 11px; margin-bottom: 10px;
    text-shadow: 2px 2px 0 #000;
  }
  .party-list { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
  .party-mon {
    background: var(--fr-cream);
    border: 3px solid var(--fr-brown);
    border-radius: 6px;
    padding: 8px;
    display: flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
    color: var(--fr-dark);
  }
  .party-mon:hover { border-color: var(--fr-red); }

function generateWorld() {
  // Build a grid of tile codes
  const g = Array.from({length: MAP_H}, () => Array(MAP_W).fill('.'));

  // Border trees
  for (let x = 0; x < MAP_W; x++) { g[0][x] = 'T'; g[MAP_H-1][x] = 'T'; }

  // Noah's house (3x3 top-left)
  placeBuilding(g, 3, 3, 3, 2, 'B'); // 3x2 roof with doors
  // Rival's house
  placeBuilding(g, 8, 3, 3, 2, 'B');
  // Sign
  g[7][5] = '$';

  // -------- PATH FROM TWINLEAF DOWN TO ROUTE 201 --------
  for (let y = 6; y < 15; y++) g[y][5] = 'p';

  for (let x = 5; x < 25; x++) g[14][x] = 'p';

function placeBuilding(g, x, y, w, h, roofType) {
  // Top row: roof; middle: walls; bottom row: walls with door
  for (let dy = 0; dy < h; dy++) {
    for (let dx = 0; dx < w; dx++) {
      if (dy === 0) g[y+dy][x+dx] = roofType;
      else if (dy === h-1) g[y+dy][x+dx] = '#';
      else g[y+dy][x+dx] = '#';
    }
  }
  // Put a door in the bottom row (center)
  const doorX = x + Math.floor(w/2);
  g[y + h - 1][doorX] = 'D';
}
function patch(g, x, y, w, h, ch) {
  for (let dy = 0; dy < h; dy++)
    for (let dx = 0; dx < w; dx++)
      if (g[y+dy] && g[y+dy][x+dx] === '.') g[y+dy][x+dx] = ch;

  state.player     = s.player     || { x: 5, y: 4, dir: 'down' };
  state.party      = s.party      || [];
  state.activeMon  = Math.min(s.activeMon || 0, state.party.length - 1);
  state.balls      = s.balls      ?? 10;
  state.money      = s.money      ?? 500;
  state.caught     = s.caught     ?? state.party.length;
  return true;
}

function saveLocal() {
  try {
    localStorage.setItem(SAVE_KEY, JSON.stringify(buildSavePayload()));
    flashCloudIndicator('💾 Saved', '#808080');
    // Also push to cloud if signed in (debounced)
    if (state.user && window.fb) queueCloudSave();
  } catch (e) { console.warn('Save failed:', e); }
}

function loadLocal() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (!raw) return false;
    return applySavePayload(JSON.parse(raw));
  } catch (e) { console.warn('Load failed:', e); return false; }
}

function hasLocalSave() {
  try { return !!localStorage.getItem(SAVE_KEY); } catch { return false; }
}

function eraseSave() {
  try { localStorage.removeItem(SAVE_KEY); } catch {}
}

let _cloudSaveTimer = null;
function queueCloudSave() {
  if (_cloudSaveTimer) clearTimeout(_cloudSaveTimer);
  _cloudSaveTimer = setTimeout(doCloudSave, 1500);
}

async function doCloudSave() {
  if (!state.user || !window.fb || state.cloudSyncing) return;
  state.cloudSyncing = true;
  try {
    await window.fb.saveDoc(state.user.uid, buildSavePayload());
    flashCloudIndicator('☁️ Synced to cloud', '#30a040');
  } catch (e) {
    console.warn('Cloud save failed:', e);
    flashCloudIndicator('⚠️ Cloud save failed', '#c03030');
  } finally { state.cloudSyncing = false; }
}

async function doCloudLoad() {
  if (!state.user || !window.fb) return false;
  try {
    const data = await window.fb.loadDoc(state.user.uid);
    if (!data) return false;
    applySavePayload(data);
    try { localStorage.setItem(SAVE_KEY, JSON.stringify(data)); } catch {}
    flashCloudIndicator('☁️ Loaded cloud save', '#30a040');
    return true;
  } catch (e) {
    console.warn('Cloud load failed:', e);
    return false;
  }
}

function flashCloudIndicator(text, color = '#30a040') {
  let el = document.querySelector('.cloud-indicator');
  if (!el) {
    el = document.createElement('div');
    el.className = 'cloud-indicator';
    document.body.appendChild(el);
  }
  el.textContent = text;
  el.style.background = color;
  el.classList.add('show');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('show'), 1500);
}

    b.classList.add('online');

}

function makeMon(id, level = 5) {
  const base = POKEDEX[id];
  const maxHp = Math.floor(base.hp * (1 + level * 0.1));
  return {
    id, level, name: base.name, types: base.types,
    maxHp, hp: maxHp,
    atk: Math.floor(base.atk * (1 + level * 0.08)),
    def: Math.floor(base.def * (1 + level * 0.08)),
    moves: [...base.moves], catchRate: base.catchRate, xp: 0,
  };
}

function renderLogin(mode = 'signin') {
  state.screen = 'login';
  const isSignup = mode === 'signup';
  screen.innerHTML = `
    <div class="login-screen fade-in">
      <h2>${isSignup ? '🆕 CREATE ACCOUNT' : '🔐 SIGN IN'}</h2>
      <div class="login-card">
        <label>EMAIL</label>
        <input type="email" id="loginEmail" placeholder="you@example.com" autocomplete="email">
        <label>PASSWORD</label>
        <input type="password" id="loginPassword" placeholder="at least 6 characters" autocomplete="${isSignup ? 'new-password' : 'current-password'}">
        <div class="login-msg" id="loginMsg"></div>
      </div>
      <div class="account-status">Your saved game syncs to any device you sign in on.</div>
    </div>
  `;
  setMsgInstant(isSignup
    ? "Create an account to save your Pokemon to the cloud!"
    : "Sign in to load your cloud save.");
  setActions([
    { label: isSignup ? '🆕 CREATE' : '🔐 SIGN IN', primary: true, onClick: () => doAuth(isSignup) },
    { label: isSignup ? 'I HAVE AN ACCOUNT' : 'CREATE ACCOUNT', onClick: () => renderLogin(isSignup ? 'signin' : 'signup') },
    { label: '⬅ BACK', back: true, onClick: renderTitle },
  ]);
  setTimeout(() => document.getElementById('loginEmail')?.focus(), 50);
  document.addEventListener('keydown', loginKeyHandler);
}

function loginKeyHandler(e) {
  if (state.screen !== 'login') { document.removeEventListener('keydown', loginKeyHandler); return; }
  if (e.key === 'Enter') {
    e.preventDefault();
    // figure out mode from current title
    const isSignup = document.querySelector('.login-screen h2')?.textContent?.includes('CREATE');
    doAuth(isSignup);
  }
}

async function doAuth(isSignup) {
  const email = document.getElementById('loginEmail').value.trim();
  const pass  = document.getElementById('loginPassword').value;
  const msg   = document.getElementById('loginMsg');
  msg.classList.remove('success');
  if (!email || !pass) { msg.textContent = 'Please enter both fields.'; return; }
  if (pass.length < 6) { msg.textContent = 'Password must be at least 6 characters.'; return; }
  if (!window.fb) { msg.textContent = 'Firebase not configured. See FIREBASE-SETUP.md.'; return; }

  msg.textContent = isSignup ? 'Creating account...' : 'Signing in...';
  try {
    const cred = isSignup ? await window.fb.createUser(email, pass)
                          : await window.fb.signIn(email, pass);
    state.user = { uid: cred.user.uid, email: cred.user.email };
    updateAccountBadge();
    msg.classList.add('success');
    msg.textContent = isSignup ? '✓ Account created! Loading...' : '✓ Signed in! Loading cloud save...';

    // Merge strategy: if cloud has a save and local has one, prefer cloud.
    // If new signup, push local save up (so existing progress doesn't get lost).
    if (isSignup) {
      if (hasLocalSave()) await doCloudSave();
    } else {
      const loaded = await doCloudLoad();
      if (!loaded && hasLocalSave()) {
        // Signed in but no cloud save yet — push local up so future sessions get it
        await doCloudSave();
      }
    }
    setTimeout(renderTitle, 600);
  } catch (e) {
    const codeMap = {
      'auth/email-already-in-use': 'That email already has an account. Try signing in.',
      'auth/invalid-email': 'That email address is not valid.',
      'auth/weak-password': 'Password is too weak (needs 6+ characters).',
      'auth/wrong-password': 'Wrong password.',
      'auth/user-not-found': 'No account with that email. Try creating one.',
      'auth/invalid-credential': 'Wrong email or password.',
      'auth/too-many-requests': 'Too many attempts. Wait a bit and try again.',
    };
    msg.textContent = codeMap[e.code] || ('Error: ' + (e.message || e.code));
  }
}

async function handleSignOut() {
  if (!window.fb) return;
  try { await window.fb.signOut(); } catch {}
  state.user = null;
  updateAccountBadge();
  renderTitle();
}

  if (x >= 25 && y < 14) return 'Route 202';
  if (x >= 25 && y >= 16) return 'Jubilife City';
  if (y >= 25) return 'Route 203';
  if (x >= 35 && y >= 27) return 'Oreburgh Gate';
  return 'Route 201';
}

function updatePlayerPos() {

}

function updateCamera() {
  const world = $('#world'); if (!world) return;
  const vpW = screen.clientWidth;
  const vpH = screen.clientHeight;
  // center on player
  let camX = state.player.x * TILE_SIZE + TILE_SIZE/2 - vpW/2;
  let camY = state.player.y * TILE_SIZE + TILE_SIZE/2 - vpH/2;
  // clamp to map
  camX = Math.max(0, Math.min(MAP_W * TILE_SIZE - vpW, camX));
  camY = Math.max(0, Math.min(MAP_H * TILE_SIZE - vpH, camY));
  world.style.transform = `translate(${-camX}px, ${-camY}px)`;
}

function canWalk(x, y) {
  if (x < 0 || y < 0 || x >= MAP_W || y >= MAP_H) return false;
  const c = state.world[y][x];
  if (BLOCKING.has(c)) return false;
  // block doors but count as interact; block NPCs
  if (state.npcs.some(n => n.x === x && n.y === y)) return false;
  return true;
}

function facingTile() {
  const { x, y, dir } = state.player;
  if (dir === 'up') return { x, y: y - 1 };
  if (dir === 'down') return { x, y: y + 1 };
  if (dir === 'left') return { x: x - 1, y };
  if (dir === 'right') return { x: x + 1, y };
  return { x, y };
}

document.addEventListener('keydown', (e) => {
  if (state.screen !== 'overworld') return;
  const k = e.key.toLowerCase();
  let dx = 0, dy = 0, dir = state.player.dir;
  if (k === 'arrowup' || k === 'w') { dy = -1; dir = 'up'; }
  else if (k === 'arrowdown' || k === 's') { dy = 1; dir = 'down'; }
  else if (k === 'arrowleft' || k === 'a') { dx = -1; dir = 'left'; }
  else if (k === 'arrowright' || k === 'd') { dx = 1; dir = 'right'; }
  else return;
  e.preventDefault();

  state.player.dir = dir;
  const nx = state.player.x + dx, ny = state.player.y + dy;

  // Check NPC interaction
  const npc = state.npcs.find(n => n.x === nx && n.y === ny);
  if (npc) { interactNpc(npc); return; }

  // Check sign / door
  if (ny >= 0 && ny < MAP_H && nx >= 0 && nx < MAP_W) {
    const t = state.world[ny][nx];
    if (t === '$') { showSign(nx, ny); return; }
    if (t === 'D') { enterBuilding(nx, ny); return; }
  }

  if (canWalk(nx, ny)) {
    state.player.x = nx; state.player.y = ny;
    updatePlayerPos();
    updateCamera();
    updateLocation(false);
    checkEncounter();
  }
});

function interactNpc(npc) {
  let i = 0;
  setMsg(`${npc.name}: "${npc.lines[0].replace(/^[^:]+:\s*/, '')}"`);
  setActions([{ label: i < npc.lines.length - 1 ? 'NEXT ▶' : 'OK', primary: true, onClick: () => {
    i++;
    if (i < npc.lines.length) {
      setMsg(npc.lines[i]);
      setActions([{ label: i < npc.lines.length - 1 ? 'NEXT ▶' : 'OK', primary: true, onClick: arguments.callee }]);
    } else {
      enterOverworld();
    }
  }}]);
  // Simpler loop:
  function advance() {
    i++;
    if (i < npc.lines.length) {
      setMsg(npc.lines[i]);
      setActions([{ label: i < npc.lines.length - 1 ? 'NEXT ▶' : 'OK', primary: true, onClick: advance }]);
    } else {
      enterOverworld();
    }
  }
  setMsg(npc.lines[0]);
  setActions([{ label: npc.lines.length > 1 ? 'NEXT ▶' : 'OK', primary: true, onClick: advance }]);
}

    setActions([

        state.money -= 100; state.balls++; updateHeader(); saveLocal();
        setMsg(`CLERK: "Thank you! Come again!"`);
        setActions([{ label: 'LEAVE', primary: true, onClick: enterOverworld }]);
      }},
      { label: 'BUY 5 BALLS ($450)', disabled: state.money < 450, onClick: () => {
        state.money -= 450; state.balls += 5; updateHeader(); saveLocal();
        setMsg(`CLERK: "Bulk discount! Thank you!"`);
        setActions([{ label: 'LEAVE', primary: true, onClick: enterOverworld }]);
      }},
      { label: 'LEAVE', back: true, onClick: enterOverworld },
    ]);
  } else if (isLab) {
    setMsg(`PROF. ROWAN: "My lab is always open to you, Noah! Keep filling the Sinnoh Pokedex!"`);
    setActions([{ label: 'LEAVE', primary: true, onClick: enterOverworld }]);
  } else {
    setMsg(`The door is locked.`);
    setActions([{ label: 'OK', primary: true, onClick: enterOverworld }]);
  }
}

function checkEncounter() {
  const t = state.world[state.player.y][state.player.x];
  if (t === 'g') {
    state.stepsSinceEncounter++;
    const chance = 0.22 + Math.min(0.28, state.stepsSinceEncounter * 0.04);
    if (Math.random() < chance) {
      state.stepsSinceEncounter = 0;
      startWildBattle();
    }
  }
}

function typeMultiplier(moveType, targetTypes) {
  let mult = 1;
  targetTypes.forEach(t => {
    const tc = TYPE_CHART[moveType];
    if (tc && tc[t] !== undefined) mult *= tc[t];
  });
  return mult;
}

function calcDamage(attacker, defender, move) {
  const m = MOVES[move];
  if (!m || m.power <= 1) return { dmg: 0, eff: 1 };
  const eff = typeMultiplier(m.type, defender.types);
  const stab = attacker.types.includes(m.type) ? 1.5 : 1;
  const base = ((2 * attacker.level / 5 + 2) * m.power * (attacker.atk / defender.def)) / 50 + 2;
  const variance = 0.85 + Math.random() * 0.15;
  const dmg = Math.max(eff > 0 ? 1 : 0, Math.floor(base * eff * stab * variance));
  return { dmg, eff };
}

function getSpritePos(selector) {
  const el = document.querySelector(selector);
  if (!el) return { x: 0, y: 0, w: 0, h: 0 };
  const rect = el.getBoundingClientRect();
  const parent = $('#battleRoot').getBoundingClientRect();
  return {
    x: rect.left - parent.left,
    y: rect.top - parent.top,
    w: rect.width, h: rect.height,
    cx: rect.left - parent.left + rect.width/2,
    cy: rect.top - parent.top + rect.height/2,
  };
}

async function playMoveAnimation(moveName, attackerIsPlayer) {
  const mv = MOVES[moveName];
  if (!mv) return;
  const root = $('#battleRoot');
  if (!root) return;

  const attackerSel = attackerIsPlayer ? '#playerSprite' : '#enemySprite';
  const targetSel   = attackerIsPlayer ? '#enemySprite' : '#playerSprite';
  const attackerEl  = document.querySelector(attackerSel);
  const targetEl    = document.querySelector(targetSel);
  const aPos = getSpritePos(attackerSel);
  const tPos = getSpritePos(targetSel);

  // Small lunge from attacker
  attackerEl.classList.add(attackerIsPlayer ? 'attack-forward' : 'attack-back');
  setTimeout(() => attackerEl.classList.remove('attack-forward','attack-back'), 400);

  const fx = mv.fx;
  switch (fx) {
    case 'fire':     await animateProjectiles(aPos, tPos, ['🔥','🔥','🔥','✨'], 6, '#ff6020'); break;
    case 'water':    await animateProjectiles(aPos, tPos, ['💧','💦','💧'], 8, '#4090f0'); break;
    case 'electric': await animateElectric(tPos); break;
    case 'grass':    await animateProjectiles(aPos, tPos, ['🍃','🌿','🍃'], 7, '#60c840'); break;
    case 'impact':   await animateImpact(tPos, '💥'); break;
    case 'slash':    await animateSlash(tPos); break;
    case 'dash':     await animateDash(attackerIsPlayer, aPos, tPos); break;
    case 'bite':     await animateImpact(tPos, '🦷'); break;
    case 'rock':     await animateProjectiles(aPos, tPos, ['🪨','🪨','⬛'], 5, '#888'); break;
    case 'ground':   await animateGround(tPos); break;
    case 'ghost':    await animateGhost(tPos); break;
    case 'psychic':  await animatePsychic(tPos); break;
    case 'dragon':   await animateDragon(aPos, tPos); break;
    case 'fighting': await animateImpact(tPos, '👊'); break;
    case 'ice':      await animateProjectiles(aPos, tPos, ['❄️','🌨','❄️'], 7, '#a0d8f0'); break;
    case 'wind':     await animateProjectiles(aPos, tPos, ['💨','💨','🌬'], 5, '#c8c8e0'); break;
    case 'stat':     await animateStat(attackerEl); break;
    case 'splash':   await animateSplash(aPos); break;
    default:         await animateImpact(tPos, '💥');
  }
}

function spawnEl(html, parent) {
  const d = document.createElement('div');
  d.innerHTML = html;
  parent.appendChild(d.firstChild);
  return parent.lastChild;
}

function animateProjectiles(aPos, tPos, emojis, count, glow) {
  const root = $('#battleRoot');
  return new Promise(resolve => {
    for (let i = 0; i < count; i++) {
      const p = document.createElement('div');
      p.className = 'move-particle';
      p.textContent = emojis[Math.floor(Math.random() * emojis.length)];
      const startX = aPos.cx - 12 + (Math.random() * 30 - 15);
      const startY = aPos.cy - 12 + (Math.random() * 30 - 15);
      const endX = tPos.cx - 12 + (Math.random() * 40 - 20);
      const endY = tPos.cy - 12 + (Math.random() * 40 - 20);
      p.style.left = startX + 'px';
      p.style.top = startY + 'px';
      p.style.textShadow = glow ? `0 0 10px ${glow}` : 'none';
      p.style.fontSize = (22 + Math.random() * 10) + 'px';
      p.style.transition = `left 0.45s cubic-bezier(.3,.9,.6,1), top 0.45s cubic-bezier(.3,.9,.6,1), opacity 0.45s`;
      root.appendChild(p);
      setTimeout(() => {
        p.style.left = endX + 'px';
        p.style.top = endY + 'px';
      }, 30 + i * 40);
    }
    setTimeout(() => {
      root.querySelectorAll('.move-particle').forEach(e => e.remove());
      resolve();
    }, 700);
  });
}

async function doPlayerMove(moveName) {
  const b = state.battle;
  const mon = state.party[state.activeMon];
  setActions([]);
  setMsg(`${mon.name.toUpperCase()} used ${moveName.toUpperCase()}!`);
  await sleep(700);

  await playMoveAnimation(moveName, true);

  const es = $('#enemySprite'); es.classList.add('hit');
  await sleep(500);
  es.classList.remove('hit');

  const { dmg, eff } = calcDamage(mon, b.wild, moveName);
  b.wild.hp = Math.max(0, b.wild.hp - dmg);
  updateBattleUI();

  if (moveName === 'Splash') setMsgInstant("But nothing happened...");
  else if (MOVES[moveName].power === 0) setMsgInstant(`${mon.name.toUpperCase()}'s ${moveName.toUpperCase()} had an effect!`);
  else if (eff > 1) setMsgInstant(`A critical hit! It's SUPER EFFECTIVE! (-${dmg} HP)`);
  else if (eff < 1 && eff > 0) setMsgInstant(`It's not very effective... (-${dmg} HP)`);
  else if (eff === 0) setMsgInstant(`It had no effect on ${b.wild.name.toUpperCase()}...`);
  else setMsgInstant(`${b.wild.name.toUpperCase()} took ${dmg} damage.`);
  await sleep(900);

  if (b.wild.hp <= 0) { await faintEnemy(); return; }
  await enemyTurn();
}

async function enemyTurn() {
  const b = state.battle;
  const mon = state.party[state.activeMon];
  const move = b.wild.moves[Math.floor(Math.random() * b.wild.moves.length)];
  setMsg(`Wild ${b.wild.name.toUpperCase()} used ${move.toUpperCase()}!`);
  await sleep(700);

  await playMoveAnimation(move, false);

  const ps = $('#playerSprite'); ps.classList.add('hit');
  await sleep(500);
  ps.classList.remove('hit');

  const { dmg, eff } = calcDamage(b.wild, mon, move);
  mon.hp = Math.max(0, mon.hp - dmg);
  updateBattleUI();

  if (eff > 1) setMsgInstant(`It's SUPER EFFECTIVE! (-${dmg} HP)`);
  else if (eff < 1 && eff > 0 && dmg > 0) setMsgInstant(`It's not very effective... (-${dmg} HP)`);
  else if (dmg > 0) setMsgInstant(`${mon.name.toUpperCase()} took ${dmg} damage.`);
  else setMsgInstant(`But it failed!`);
  await sleep(900);

  if (mon.hp <= 0) { await faintPlayer(); return; }
  battleMainMenu();
}

async function faintEnemy() {
  const b = state.battle;
  const mon = state.party[state.activeMon];
  $('#enemySprite').classList.add('faint');
  setMsgInstant(`Wild ${b.wild.name.toUpperCase()} fainted!`);
  const xpGain = 10 + b.wild.level * 5;
  mon.xp += xpGain;
  const cash = 20 + b.wild.level * 8;
  state.money += cash;
  updateHeader();
  await sleep(1100);
  setMsg(`${mon.name.toUpperCase()} gained ${xpGain} EXP! Got $${cash}.`);
  let leveledUp = false;
  while (mon.xp >= mon.level * 20) {
    mon.xp -= mon.level * 20;
    mon.level++;
    mon.maxHp += 4; mon.hp += 4;
    mon.atk += 2; mon.def += 2;
    leveledUp = true;
  }
  updateBattleUI();
  await sleep(900);
  if (leveledUp) {
    setMsg(`🌟 ${mon.name.toUpperCase()} grew to Lv${mon.level}!`);
    await sleep(1300);
  }
  endBattle();
}

async function faintPlayer() {
  const mon = state.party[state.activeMon];
  $('#playerSprite').classList.add('faint');
  setMsg(`${mon.name.toUpperCase()} fainted!`);
  await sleep(1300);
  const alive = state.party.findIndex(m => m.hp > 0);
  if (alive === -1) {
    setMsg(`Noah is out of usable POKEMON! You blacked out and returned to the Pokemon Center...`);
    await sleep(1900);
    state.party.forEach(m => m.hp = Math.max(1, Math.floor(m.maxHp / 2)));
    state.money = Math.max(0, state.money - 100);
    updateHeader();
    endBattle();
  } else {
    setMsg('Choose another POKEMON!');
    openParty(true);
  }
}

async function tryCatch() {
  if (state.balls <= 0) { setMsg('You have no POKEBALLS!'); return; }
  const b = state.battle;
  state.balls--;
  updateHeader();
  setActions([]);
  setMsg(`Noah threw a POKEBALL!`);

  const pb = document.createElement('div');
  pb.className = 'pokeball-anim throw';
  $('#battleRoot').appendChild(pb);
  await sleep(900);
  pb.classList.remove('throw');
  pb.style.left = '520px'; pb.style.top = '160px';

  const es = $('#enemySprite'); if (es) es.style.visibility = 'hidden';

  const hpRatio = b.wild.hp / b.wild.maxHp;
  const chance = Math.min(0.95, b.wild.catchRate * (1.8 - hpRatio));
  const shakes = Math.min(3, Math.floor(chance * 4) + Math.floor(Math.random() * 2));

  pb.classList.add('wiggle');
  for (let i = 0; i < shakes; i++) { await sleep(600); setMsgInstant(`shake... (${i+1})`); }
  pb.classList.remove('wiggle');
  await sleep(400);

  if (Math.random() < chance) {
    setMsg(`Gotcha! ${b.wild.name.toUpperCase()} was caught!`);
    state.caught++;
    const captured = makeMon(b.wild.id, b.wild.level);
    captured.hp = Math.max(1, b.wild.hp);
    if (state.party.length < 6) state.party.push(captured);
    else setMsg(`Gotcha! ${b.wild.name.toUpperCase()} caught! (Party full — sent to PC)`);
    updateHeader();
    saveLocal();
    await sleep(1700);
    pb.remove();
    endBattle();
  } else {
    if (es) es.style.visibility = 'visible';
    pb.remove();
    setMsg(`Oh no! The POKEMON broke free!`);
    await sleep(1100);
    await enemyTurn();
  }
}

async function tryRun() {
  setActions([]);
  setMsg(`Got away safely!`);
  await sleep(900);
  endBattle();
}

function endBattle() {
  state.battle = null;
  saveLocal();
  enterOverworld();
}

function openParty(forceSwitch) {
  const prev = state.screen;
  state.screen = 'party';
  const body = state.party.map((m, i) => `
    <div class="party-mon ${i === state.activeMon ? 'active' : ''} ${m.hp <= 0 ? 'fainted' : ''}" data-i="${i}">
      <img src="${SPRITE_FRONT(m.id)}" alt="${m.name}">
      <div class="info">
        <div class="n">${m.name.toUpperCase()} Lv${m.level}</div>
        <div>${m.types.map(t => `<span class="type-pill type-${t}">${t.toUpperCase()}</span>`).join('')}</div>
        <div style="margin-top:3px">HP ${m.hp}/${m.maxHp}</div>
        <div>A${m.atk} D${m.def}</div>
      </div>
    </div>
  `).join('');
  screen.innerHTML = `
    <div class="party-screen fade-in">
      <h2>NOAH'S TEAM (${state.party.length}/6)</h2>
      <div class="party-list">${body}</div>
    </div>
  `;
  setMsg(forceSwitch ? 'Send out which POKEMON?' : "Click a POKEMON to make it your active battler.");
  setActions([{ label: '⬅ BACK', back: true, onClick: () => {
    if (prev === 'battle') { renderBattle(); battleMainMenu(); }
    else enterOverworld();
  } }]);
  document.querySelectorAll('.party-mon').forEach(el => {
    el.onclick = async () => {
      const i = parseInt(el.dataset.i);
      if (state.party[i].hp <= 0) { setMsg(`${state.party[i].name.toUpperCase()} has fainted!`); return; }
      state.activeMon = i;
      setMsg(`Go! ${state.party[i].name.toUpperCase()}!`);
      await sleep(700);
      if (prev === 'battle') {
        renderBattle();
        if (forceSwitch) { await sleep(400); await enemyTurn(); }
        else battleMainMenu();
      } else { enterOverworld(); }
    };
  });
}

function healParty() {
  state.party.forEach(m => m.hp = m.maxHp);
  state.balls = Math.min(40, state.balls + 3);
  updateHeader();
  setMsg(`NURSE JOY: "Your POKEMON are fully restored! We also gave you 3 POKEBALLS. 💊"`);
}

// =========================================================================
// BOOT
// =========================================================================
function boot() {
  // Wait a tick so Firebase init module can run
  renderTitle();
  // Auto-sync: if user was previously signed in, Firebase will restore session
  if (window.firebaseEnabled) {
    const hook = () => {
      if (window.fb) {
        window.fb.onAuth(async (u) => {
          if (u) {
            state.user = { uid: u.uid, email: u.email };
            updateAccountBadge();
            // Pull cloud save automatically (merge: cloud wins if newer)
            const localRaw = localStorage.getItem(SAVE_KEY);
            let localAt = 0; try { localAt = JSON.parse(localRaw || '{}').savedAt || 0; } catch {}
            try {
              const cloud = await window.fb.loadDoc(state.user.uid);
              if (cloud && (cloud.savedAt || 0) >= localAt) {
                applySavePayload(cloud);
                try { localStorage.setItem(SAVE_KEY, JSON.stringify(cloud)); } catch {}
                flashCloudIndicator('☁️ Cloud save loaded', '#30a040');
              } else if (hasLocalSave()) {
                await doCloudSave();
              }
            } catch (e) { console.warn('auto-sync failed', e); }
            if (state.screen === 'title') renderTitle();
          } else {
            state.user = null; updateAccountBadge();
            if (state.screen === 'title') renderTitle();
          }
        });
      }
    };
    if (window.fb) hook();
    else window.addEventListener('firebase-ready', hook);
  }
  updateAccountBadge();
}
boot();

// Autosave periodically too (every 30 sec while playing)
setInterval(() => {
  if (state.screen === 'overworld' || state.screen === 'battle') saveLocal();
}, 30000);

window.addEventListener('resize', () => {
  if (state.screen === 'overworld') { updatePlayerPos(); updateCamera(); }
});
</script>
</body>
